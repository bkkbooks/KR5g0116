  - {type: variant, offset: 6112, length: 846, content: 華陽吟三十首家在瓊崖萬里遥此身來徃似孤舟夜來夢趁西風去目斷家山空淚流海南一片水雲天望眼生花已十年忽一二時回首處西風夕照咽悲蟬一從脚别海南船身逐雲飛江浙天走遍洞天尋隱者不知費幾草鞋錢白雲和我到天台眼入青山意豁開到彼山中還又起空令到處夜猿哀拄杖尋身入武夷慢亭峯下雪花飛行從九曲灘頭看萬壑千巖翠打圍武夷結草二年餘花笑鶯啼春一壺流水下山人出洞巖前空有鍊丹爐得訣歸來試鍊看龍爭虎戰片時間九華天上人知得一夜風雷撼萬山白馬江頭嘯一聲紅光紫霧水中生急抽匣内青蛇劒纔得黄河徹底清渴飲金波數百鍾醉時仗劒指虚空脚根戲躡交乾斗長嘯一聲天地紅移將北斗過南辰兩手雙擎日月輪飛趁崑崙山上出須臾化作一天雲戲泛金船到海涯暗隨海水度流沙一從登着蓬萊岸去看瓊臺閬苑花人身自有一蓬萊十二層樓白玉階姹女金翁常讌會堂前夜夜牡丹開怪事教人笑幾回男兒今也會懷胎自家精血自交媾身裏夫妻是妙哉一吟一醉一刀圭眞氣眞精滿四肢若到酒酣眠熟後滿船載寳過曹溪元神夜夜宿丹田雲滿黄庭月滿天兩箇鴛鴦浮緑水水心一朵紫金蓮飢餐一兩黑龜肝寒向丹田猛火山但見心頭無點事不知人世有飢寒青牛人去幾多年此道分明在目前欲識目前眞的處一堂風冷月嬋娟片餉工夫鍊汞鈆一爐猛火夜燒天忽然神水落金井打合靈砂月樣圓一泓神水滿華池夜夜池邊白雪飛雪裏有人擒玉兔趕教明月上寒枝不動絲毫過玉關關頭自有玉京山能於山内通來徃風攪九天霜雪寒誰識週天造化功于今蹙在片時中只將鈆汞入眞土鍊出金花滿鼎紅昨夜三更雷撼山九天門户不曾關曹溪路上分明見有箇金烏入廣寒曹溪一路透泥丸只在丹田上下間解使金翁媒姹女朝雲暮雨滿巫山秪將戊己作丹爐鍊得紅丸化玉酥慢守火爻三百日産成一顆夜明珠絳闕仙都一散郎偶來人世且佯狂身中自有長生寳夜夜飛神謁上蒼家在神霄九炁天天中樓殿貯群仙偶然來到人間世料想神霄未一年玉皇殿下一仙童曾掌符書守蘂宫因甚俗縁猶未斷于今幻質入塵籠氣蓋山河心膽麤不能學劒不搜書夜來掇得乾坤動火候温温守玉爐夢幻之身不久長桑榆能幾耐風霜何如跳去利名窟贈汝長生不死方拈弄溪山詩伎巧吐吞風月酒神通且將詩酒瞞人眼出入紅塵過幾冬, CK-KZ: ''}
