  - {type: variant, offset: 1700, length: 0, content: '', CK-KZ: 誰信無中養就兒空存畢法十八訣未肯輕輕說與伊舊曾三舉嗟不第自言父是呂諫議囊中瑞約無藥銀天外徜佯乘劍氣先生劍法無人傳千變萬化常忽然天將間生生靈異四月純陽卦屬乾取將坎畫歸離腹化作純乾陽氣足故能御氣化飛龍所至度人留異躅平江此會異諸方獨是今年復異常往歲會時常肹蠁雲端仙鶴日翺翔兹命野人陞此座未免從頭爲説破要須會得純陽心始堪學得純陽道道可道如何學撮土爲香未是眞知音自有張天覺東樓小參重出門人紫璚子趙収夫錄至道在心卽心是道六根內外一般風光內物轉移終有老死元和默運可得長生是故形以心爲君心者神之舍心寧則神靈心荒則神狂虛其心而正氣凝淡其心則陽和集血氣不撓自然流通志意無爲萬緣自息心悲則陰氣凝心喜則陽氣散念起則神奔念住則神逸夫人之一身其心之神發於目而能視視久則心神離不在乎貪而喪心也腎之精發於耳而能聽聽久則腎精枯不在乎淫而敗腎也肝之魂發於鼻而能嗅嗅久則肝魂散不在乎嗔而損肝也膽之魄發於口而能言言久則膽魄死不在乎躁而暴膽也至道之要至靜以凝其神精思以徹其感齋戒以應其眞慈惠以成其功卑柔以存其誠心無雜念意不外走心常歸一意自如如一心恬然四大清適心不在耳孰爲之聲心不在目孰爲之色心不在鼻孰爲之香心不在口孰爲之言氣聚則飽神和則暖所以道心者氣之主氣者形之根形是氣之宅神者形之具神卽性也氣卽命也心靜則氣正正則全氣全則神和和則凝神凝則萬寶結矣施肩吾曰氣住則神住神住則形住必也忘其情而全其性也性全則形自全氣亦全道必全也道全而神則旺氣則靈形可超性可徹也返覆流通與道爲一上自天谷下及陰端二景相逢打成一塊如是久久渾無閒斷變化在我與道合眞或者謂心動則神疲心靜則神昏一動一靜則不得無動無靜亦不得則必竟如何嬌如西子離金闕美似楊妃下玉樓日日與君花下醉更嫌何處不風流又眞師示㭒以頌曰三家村裏黃三嬸三更轉身失卻枕打著阿家鼻孔頭明日起來尋蠣鋟咄春人飲春酒春棒打春牛㭒問曰此莫是歸根復命底道理麽師云父母所生口終不爲子説㭒又問曰此理如何師云鐵鏝頭上杏花紅㭒問未審還有些契合也無師云昨日街頭兩箇賣柴漢被人打折當門齒你因}
