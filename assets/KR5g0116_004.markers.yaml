  - {type: variant, offset: 1669, length: 1, content: 學, CK-KZ: 臾離進云所謂是終日如愚答云甕裏不怕走了鱉士人禮拜師乃舉拂子打一圓相云三問三不答四問四不知如今費唇舌笑殺五須彌師復云適來僧問四果仙人與五通仙今是同是別也是奇時底問頭只今諸人還知五通四果之理麽五通魚入網四果兔游罝堪笑貪程者還郷不到家通五通兮果四果丙丁童子來求火新婦騎驢前家牽一似猢猻看水磨卓錫一下下座廬士升堂師陞座乃云過去}
