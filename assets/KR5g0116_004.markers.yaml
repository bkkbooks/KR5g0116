  - {type: variant, offset: 242, length: 315, content: 壽光趙飛燕他家别有通霄路酒肆淫坊戲歷鍊莫言花裏遇神仙却把金篦换瓦片樹根已朽葉徒青氣海波翻死如箭其他有若諸旁門尚自可結安樂縁有如服氣爲中黄有如守頂爲混元有如運氣爲先天有如咽液爲靈泉或者脾邊認一穴執定謂之呼吸根或者口鼻作玄牝納清吐濁爲返還或者默朝高上帝心目上視守泥丸與彼存思氣升降以此謂之夾脊關與彼閉息吞津唾謂之玉液金液丹與彼存神守臍下與彼作念想眉間又如運心思脊骨又如合口拄舌端竦肩縮頸偃脊背唤作直入玉京山口爲華池舌爲龍唤作神水流潺潺此皆旁門安樂法擬作天仙豈不難入十放九咽其一聚氣歸臍離胎息手持念珠數呼吸水壺土圭測時刻或依靈寳畢法行勒尾閭兮咽津液或叅西山會眞記終日無言面對壁時人雖是學坐禪何曾月照寒潭碧時人雖是學抱元何曾如玉之在石或言, CK-KZ: 問曰}
