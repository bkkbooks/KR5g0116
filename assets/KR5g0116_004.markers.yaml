  - {type: variant, offset: 1674, length: 3, content: 訣縛住, CK-KZ: 經云大道無形因甚生育天地師曰一夜月生海幾家人倚樓士云大道無情因甚卻運行日月師曰雲來山裹帽風起樹搖頭士云旣是大道無名卻又長養萬物此理如何師曰無風荷葉動决是有魚行士云天如何傾於西北師曰女媧皺卻手士云地何故陷於東南師曰大爲不知源士云魚以水爲命因甚死在水裏師曰到頭霜用夜經寓人前塗縍師曰不信但觀潮進退士云死之徒十有三𠰚師曰何如更看月盈虧士云動之死地亦十有三𠰚師曰六隻骰子滿盤紅士云生死事大無常迅速又且如何師曰朝廷有道}
  - {type: page-break, offset: 1674, content: '', id: KR5g0116_CK-KZ_01p037a, image: JY186/CK-KZ_JY186_01p037a.png}
