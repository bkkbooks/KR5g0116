  - {type: variant, offset: 1668, length: 0, content: '', CK-KZ: 進云因甚順行逆行天莫測或是或非人不識𠰚答云一吟一醉一刀圭進云可謂人人有分箇箇圓成答云莫把黃泥喚作金道士禮拜有一士人來問師日視之不見名曰希聽之不聞名曰夷希夷則不問且道如何是仰之彌高答云百尺竿頭一布巾進云鑽之彌堅𠰚答云分明題出酒家春進云瞻之在前又如何答云相逢不飲空歸去進云忽然在後答云洞裏桃花也笑人進云念兹在兹也答云君子謹其獨不可}
