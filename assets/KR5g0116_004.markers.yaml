  - {type: variant, offset: 1701, length: 9, content: 竒絶夜來撞見吕秀才, CK-KZ: 替他叫屈㭒云咦只是恁地師云你試道看㭒卻頌曰鐵饅頭上杏花紅四面玲瓏處處通踏著稱鎚硬似鐵新羅只在海門東冬至小參重出身中一寶隱在丹田輕如密霧淡似飛煙上至泥丸下及湧泉乍聚乍散或方或圓大如日輪五色霞鮮表裏瑩徹左右囘旋其硬如鐵其軟如綿其急如電其緊如弦重逾一斤飛遍三千遇陰入地逢陽升天金翁採汞姹女擒鉛依時運用就內烹煎冬至之後夏至之前金鼎湯沸玉爐火然龍吟東嶽虎嘯西川黃婆無爲丁公嘿然身中夫婦雲雨交懽天乙生水在乎清源離己坎戊以土爲先土中}
