  - {type: variant, offset: 3491, length: 3278, content: 雷區别人鬼只乞以從上雷銜借稱臣世緣該滿朝謁之日别聽仙曹施行臣萬死干冒天威陳情表具位臣某言臣謹取今月二十三日具表詣闕謝恩陳情者臣伏以性由天賦智愚善惡付之天人與道俱折旋俯仰合乎道何隂界置幽冥之府而上靈立賞罰之司身形隨氣數以爲生命運與星辰而相隸實匪自然而生死疑其皆出於隂陽天機不停物情易變冬歸而冰自泮春到而草俱青審皆氣之所陶故立性以爲主千燈照室同是一光大海含波中有萬變蓋有情無情之異與生數成數之殊然動靜皆非其本來彼想念盡形於已有形具以後道在其中惟得之者與之合眞其失之者宜乎沉惑所以啓修仙學道之路從而建正心誠意之門大道獨超乎死生至誠可回於造化存乎誠而合道得是道者皆誠此衆生所從入之塗誠列聖已常躋之域當究虚无之始實根事物之前以心契之即道也矣臣凡胎濁質走骨行尸氣所禀而有沖性所賦而不昧六根具足三際俱圓能辦菽麥於是非之間而泯薰藉於榮辱之外處動靜靜動咸靜之靜明色空空色已空之空知六識之無根照七情之如夢鑒血肉以醉其性思形質以窒其神早馳逐於玄關尚彷徨於道閫性者信也神而通之恭惟高上神霄玉清眞王長生大帝玉陛下金闕眞皇玉清上帝心含大梵手握混元浩浩難名巍巍莫及慈悲群品統御庶頁恩惠十方鑒觀萬國臣特一螻蟻之體敢鳴蚯蚓之聲夙戴洪私久霑霈濡凡伸懇禱悉荷感通幸聞道於一日之先獲修眞於萬劫之下謹述操存之漸式陳修證之初自惟顓蒙宻希訓化庶可以糞壤之姓字得陪於霄極之臣僚僣具表文仰干睿聽臣故作誤爲之罪願垂寬大之恩暫起復滅之心克合沖虚之妙所行雷部之法所掌霆司之章輔正除邪濟生度死三司將吏咸歸役使之權五部風雷緫屬招呼之令或寸功片善可録於金簡則微臣小子終到於瑶京雖蓬生麻中不扶自直然魚伏水内非養則枯謂皆鶴長鳧短之云亦有蛇化蟬蜕者也臣愚干冒天威不勝昧死謹具表奏以聞臣誠惶誠恐與彭鶴林書丁丑九月十四日玉蟾將如泉山乃告吾友鶴林眞官曰比作别未久此心甚悵怏也契兄欲學仙非庸常輩比且知有萬法歸一之理而不爲諸家所愚此前古之聖賢用心近代希有如此去道不遠不仙而何章希玉口中語有謂一階正法一階祕法一階妙法法法常在心更無别法其語雖麤率誠有以哉向相見之初便以金丹大藥相期特時節夤緣未到耳今日有期大信不約且如曩日倡和有虎皮竹籜泰華冠之句今道位泰華丹景吏乃悟前日之詩便作今日相期待也凡事宜珍重聖事宜珍重一切事宜珍重已是多口了也呵呵祕閣吏部幸與致意蘂珠居士能信得及能行是事否前所囑今冬來春安歇處只是天開圖畫亦好或來春稍爽是盟亦不多時可相見也時間不須苦以符圖留意幸養心焉否則將前後所得之法録成部帙束之高閣但與鞠郝作頭對則一切事簡而又靈異今但於二使者香爐前以某符一道常用之或鎮或貼或吞或帶隨所禱而用之無徃不利亦不須多念呪也此無他不過只是心與神會用之則靈耳呪水但以一簡易呪呪之恰如眞龍但一滴水便作滂沛豈用如許繁耶紙脩不覺縷縷思之思之時寓紫樞樓書玉蟾九月十四日自螺江泝潮而南以十八日次泉山不勝役役幸形神少寧又起三山故舊之思尚須少槃桓却作漳濱客也前者來春之盟斷不爽但且味道自娱常時惟香燭將吏外不過一符一水愈疾郤邪而已此是代天行化之本㫖令閤蘂珠令器同侍吏部壽仙日想清逸恨不曾過城東新菴爲一杯茶耳此願須欲償也學道之士申愆省非之外一有小坎𡒄惟順受爲懷惟道所在豈人間事足爲吾人喜憂耶蓬萊水又清淺矣其桑田平回首舊時路丁丑秋蜕仙菴書某戊寅三月十五日寓江州太平興國宫作書附致鶴林眞士賢弟頃嘗三遺書曾達否日來道法想精進法力又勝前也鞠郝二符吏亦效職否不審尊府吏部壽體康樂令閭蘂珠居士令嗣承奉各惟安慶鄙人今春水陸二千餘里尋隱廬山幸而四大輕爽凡事亦隨順但花晨月夕杯酒爐香頗爲我南中諸友感懷也而於老友又甚酸心焉物外人或凡或聖不以榮辱爲心毁譽爲念惟木精石怪知其爲如何人也大道歌仙系圖必刊板流廣矣喜甚喜甚老友更加鞭爲禱兹不多及珍重珍重瓊山老人白某謹書十月二十一日瓊山老叟白某致書福州鶴林眞士彭卿治所今春到江州行興國軍如岳陽回豫章過撫州謁華蓋山下臨江軍取道饒信而淛東以八月一日詣行在復遊紹興過慶元府再歸臨安十月二十日偶閑行忽與蕭潜菴遇乃知了菴已化如菴已歸祥山紫壼在蟄仙無恙寧國屢相昭更不徃見史揆任樞各有夤緣可以謁之此興甚懶亦各休休每日惟以大飲酣歌餞時光而已他無所求亦無所思惟是吾鶴林此吾愛子遠在二千里外伏惟即日上侍府丈吏部老仙與蘂珠小道生俱懽慶潜菴能道一二甚以爲慰此間狂怪自樂人亦視以爲常但國録家叔甚訝其非耳今所行之法尚更靈在偶醉了失身墮西湖水中法印爲有矣亦可發一大笑欲徃天台臨行呼潜菴授之以此南望多凝黯尺紙不宣某書致某再拜上覆鶴林眞人尊友忨愒湖山轉盻許時忽辱伻來甚慰三秋之别欣審槐屯奏凱養鍊餘閑風霆在馭台候起居萬福蘂珠侍經均禧某蒙示以清靜經夾頌字字詣道言言契眞雖荷竄易見囑然已諦當實無可指斥者源泉混混不舍晝夜及其至焉放乎四海其尚相期乎大方之家也餘惟珍䕶嗣此有可見示勿外幸幸某上覆某𡞦然一影黄塘分携君隨南