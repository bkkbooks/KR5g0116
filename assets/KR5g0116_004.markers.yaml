  - {type: variant, offset: 1913, length: 466, content: 手片時伏虎活擒龍黄婆聘入丁公舍巽位吹嘘九轉功十月胎圓離坎外紫雲飛岀玉爐空短褐包巾滿廛巿尋草燒茅烹藥櫃自己三黄及四神誰知安竈烹爐意紙襖麻衣要隱山餐松飲水守飢寒日魂月魄空呼吸到底方知入道難黑山山下鬼窟裏背曲頭垂口流水夢中夢見夢中人幾時待得硫黄死薄福癡人不斷婬尾閭閉了採他隂元精揺撼無墻壁錯認黄泥唤作金容成三峯學御女採精吸與葉眼乳大道本火無隂陽勞形著相徒自苦叩齒吞津咽氣聲轆轤空動髑髏形妄將口鼻爲玄牝謾説金晶肘後盈鼻頭閉息空畫餅幾人日中逃得影客風邪氣肚中鳴安得靈砂長在鼎參禪見性契眞如莫道無心便靠虚悟了不行乾智慧千崖萬壑涉程途多少老儒學周易豈知太極歸無極忘形便欲任天眞只恐春歸草無力眀教專門事滅魔七時功德便如何不知清淨光眀意面色痿黄空自勞胡氏陽山一果祖九返莊嚴皆妄語手執金環運三車阿誰飛上金天去更有持齋四果徒九曲江頭下鐵符乳香燒盡難成佛精血元陽般運枯三千六百旁門術開頂縮龜習定息存想丹田鍊五芽吐故納新虚費力禮塔焚香誦藏經更能拜斗與瞻星吞符飲水專持呪恁地如何得道成注想按摩八段錦嘻呵六字拘興寢若要還精補腦時除非一盞醍醐飲雙眼遥思運頂門戲言日, CK-KZ: 蘆花}
