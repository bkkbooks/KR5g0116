  - {type: variant, offset: 1030, length: 0, content: '', CK-KZ: 會則目有聖凡所以魏伯陽之河土姹女許旌陽之水上鐵舟鍾離權之金液還丹劉海蟾之玉華眞水如是則月圓月缺不離水雲去雲來何礙天結座云所以昔毗陵薛眞人向禪宗了徹大事然後被杏林眞人穿卻鼻孔所謂千虛不博一實張紫陽云終日行未嘗行終日坐未嘗坐}
