  - {type: variant, offset: 1035, length: 1, content: 昧, CK-KZ: 人無兩心若識不破時喚侍者一聲侍者應喏師云早上喫粥了麽侍者云喫粥了師云好物不中飽人喫常州清醮升堂祝香罷師乃云雲從龍風從虎山鳴谷應響合影隨若是知音何妨漏泄僧問我音釋迦文佛曾爲忍辱仙人未審爲仙何似爲佛答云水向石邊流出冷風從花裏過來香進云恁麽則楞嚴經云十種仙人不得正覺又作麽生答云紅輪光爍爍爭奈覆盆何進云傅大士因甚卻道饒經八萬劫終是落空亡𠰚答云有爲皆是幻無相乃爲眞進云四果仙人與五通仙人是同是別答云一等是麫由人造作進云必竟神仙何如般若答云眞鍮不換金進云且道老胡與老聃有何優劣答云必竟水須朝海去到頭雲定覓山歸進云如是則一點水墨兩處成龍答云鵝王擇乳素非鴨類進云還許作家漢向這裏打破藩籬得麽答云蝦跳不出斗僧禮拜道人問欲知火候通玄處須共神仙子細論答云潘閬倒騎驢進云君火臣火民火野火周天火卯酉火天罡火必竟如何是大藥火候答云金烏西沉玉兔東升進云聖人傳藥不傳火答云莫怪天機都漏泄皆緣學者太迷蒙進云眾生未悟如何指迷答云汝見無舌人解語麽進云如此則始於有作人皆見及至無爲眾始知也答云恍惚裏相逢杳冥中有變進云所謂是灰心行水火定裏採眞鉛耶答云白鹿能飛步蒼龜解固形進云因是乃知藥中有火火中有藥也答云吾友高姓道人不告禮拜而去道士問承聞金丹大藥}
