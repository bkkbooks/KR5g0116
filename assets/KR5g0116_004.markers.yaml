  - {type: variant, offset: 0, length: 3, content: 海瓊白, CK-KZ: 助武夷升堂門人煙壺葉古熙等錄此一瓣香混沌未判前萌芽龍漢新元初枝葉無陰陽地龍盤虎踞得乾坤外雨洒風吹崑崙山上蕊不花華池水邊樹無影濃烟非色薰透太清頂門瑞藹無聲化入元始鼻孔持起則妖魔膽碎焚時則籟動風鳴方知道釋迦親手栽培孔子無心採取全太極未分之氣乃虛空不死之根爇向爐中恭爲先聖先師出言吐氣上祝一人有慶萬國咸寧六府孔修百揆時敘遍天地皆是大羅聖境盡山川同作玄都玉京莫有學道}
