  - {type: variant, offset: 2998, length: 492, content: 節飲食省睡眠絶笑談息思慮把茅蓋頂莫求安適煑米療飢莫分微惡如蟬飮露體自輕清如龜吸日壽乃延長苦能餐松啗栢戴笠披簑巖下眠雲洞前飲水猶是作家人也如其未有力量旦且漸學古賢苟不如是修行則是無此福分朝收暮採日鍊時烹如龍養珠如雞抱卵火種相續打成一片至於子母相見不亦樂乎傳法明心頌彭鶴林萬法從心生心心即是法語嘿與動靜皆法所使然無疑是眞心守一是正法守一而無疑法法皆心法法是心之臣心是法之主無疑則心正心正則法靈守一則心專心專則法驗非法之靈驗蓋汝心所以黄籙借職奏狀地下得道奉法童子臣白某右臣夙以高皇帝王神炁在身不昧靈根知有此事曩生修習今生遭逢叨綰雷章粗眀教法惟是臣自知太上大道慈父聖母十方諸君丈人每垂赦宥臣以故亦多懶慢終年不修香火其在仙籍殆若無臣臣所以又敢冒昧奏聞臣亦有説是臣此身皮毛骨血涕淚涎沫不能成眞臣有一靈之天本來之性元命之神神而無方大不可測可以上賔帝梵立侍玉晨臣雖懶慢而帝眞知之雖鬼神亦無如之何也矣臣曩歲警覺今凡得道奉法之士所有銜位並係僞稱若在天司别有品配臣今以草土彭㭒爲父演建黄籙令臣關啓臣既不可辭乞時暫以高上神霄玉清府雷霆令統五雷將兵提領雷霆都司鬼神公事攝行上清黄籙使臣俟醮筵滿日仍舊解職若遇役使, CK-KZ: 東}
