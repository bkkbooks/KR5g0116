  - {type: variant, offset: 926, length: 1, content: 只, CK-KZ: 鍾離言是屬陰涕唾精血腦氣神王鼎汞爲七返未審此理如何解會答云鑿石方逢玉默菴問曰金丹未成如何是有龍虎金丹已成如何是無龍虎師答云始於有物無人識乃至無形有處知復問曰滿堂渾是客誰是主人翁答云一字兩字重千聖擔不起煙壺問曰金丹之道在易則乾坤坎離在天則斗箕日月在丹則龍虎水火在藥則鉛銀砂汞在人則夫婦男女不過曰陰陽二字愚已知之矣所謂太極眞土此爲何義師答云千峰勢到嶽邊止萬泒聲歸海上消紺雲問曰夫欲鍊金丹者須洞曉陰陽深明造化方能追二氣於黃道會三性於元宮攢簇五行合和四象如何是金丹之旨師答云金者天發殺機丹者虛中有象復問曰大道本無物如何}
