  - {type: variant, offset: 1698, length: 0, content: '', CK-KZ: 釋迦老子敗闕處師有頌曰釋迦文佛五通仙鼻孔依然沒半邊昨夜四更山吐月泥牛孔動四擇天師示眾云從生至死只是者箇條條倩你剝落各要洒洒而歸做得主把得定牢籠不肯住呼喚不囘頭常光現前壁立萬仞孤逈逈峭巍巍圓陀陀光爍爍臨崖撒手自肯承當絕後再甦欺君不得若能恁麽方説得人能常清靜天地悉皆歸所以道天地與我同根萬物與我同體無苦寂滅道無作上任滅且道作麽生道癡人面前不得說夢上堂云諸多學徒聽予宣演不可以知知不可以識識向不放長得在來日也上堂云拈起便會不會便休何故如此良久云父母所生口終不爲子說上堂云天下無難事都來心不專旣是無難卻又專心作麽若不專心一期不易此意如何大蟲看水磨上堂云無手人欲行拳時如何孝子喪父母時如何餓狗見熱油鐺時如何有人知得下落不妨同過喫茶上堂云一去無消息憐伊也恨伊聲聲聞杜宇謾道不如歸上堂云虛空有血混沌有骨爛泥裏有刺還會麽泥滑滑泥滑滑上堂云聞時富貴見後貧窮便道貧窮應未得一家六口日春風上堂云昨日失便宜達摩缺卻當門齒今日得便宜趙州東壁挂葫蘆吽吽上堂云若便下坐上堂云雨兒似織絲絲知是從何出江水滔滔流向滄溟又作麽良久云你且道眉高幾尺眼闊幾丈上堂云更嫌何處不風流便下座平江鶴會升堂祝香問答罷師乃云問話且止問亦無窮答亦無盡一問一答復有何益縱有懸河之辯曾何擬議其玄微使皆飛屑之辭亦莫髣髴其要妙諸人還知麽混沌未判之初氣象何殊今日父母未生以前一生參學事畢粤自兩周之季始自三教之興孔氏則四端五常釋氏則三乘四諦老氏則三洞四輔若夫孔氏之教惟一字之誠而已釋氏之教惟一字之定而已老氏則清靜而已所謂是人能常清靜天地悉皆歸其在孔氏者豈不見云吾嘗終日不食終夜不寢終日如愚三月不違仁善養吾浩然之氣念兹在兹則其庶乎屢空也必矣夫爲道學者如何致君堯舜上再使風俗淳其在釋氏者豈不見云二六時中常光現前壁立萬仞如鷄抱卵常使暖氣不絶綿綿密密無令間斷則所謂臨崖撒手便肯承當絕後再甦欺君不得也必矣夫爲禪學者如何臨濟入門便喝有理不在高聲德山入門便棒打草只要蛇驚其在老氏者豈不見云洞曉陰陽深達造化追二氣於黃道會三性於元宮攢簇五行合和四象龍吟虎嘯夫唱婦隨玉鼎湯煎金爐火熾節候旣周脫胎神化功成名遂身外有身也必矣夫爲仙學者如何牽將白虎歸家養產箇明珠似月圓必竟三教是同是別不知說箇何年事直至而今笑不休師復云日月如梭光陰如箭柳線牽將春色去荷錢買得夏風來隨朝開櫻筍之厨釋氏結蠟人之制十洲三島盡雲筒月筑之流四海五湖俱雨笠煙簑之客無限廛中散聖幾多物外高仙凡聖同居隱顯莫測叙謝不錄結座云皇宋嘉定十四年秀葽紀月清和天湖山已還武林債風月復結姑蘇緣姑蘇其月十有四四眾共結純陽會純陽眞人此日生漂灘舊有仙游記我聞唐代呂純陽師是鍾離字雲房親傳金液還丹訣得道之時游荆襄世人還識純陽否鶴頸龜腮身弊垢或時磨鏡市中行或時賣墨街頭走或稱姓田或姓囘江口京口歸去來曾擔兩甕過廬阜復吹雙笛行天台青帽紅袍長爛飲袖有青蛇威凜凜洪都度得西山施霅川度得東林沈朝游百粵暮三呉形神聚散俄有無茶中傳授郭上竈酒裏點化何仙姑或衣白襴或紙襖一劍橫空幾番倒大笑歸從投子山片言勘破黃龍老太平寺裏舊題詩三入岳陽知不知黃昏武夷拂衣去午夜君山翫月歸醉倒狂歌歌則舞一局棋殘幾今古清風明月黃鶴樓白蘋紅蓼湓江浦當年飲罷一}
