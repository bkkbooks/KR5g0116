  - {type: variant, offset: 3491, length: 3278, content: 雷區别人鬼只乞以從上雷銜借稱臣世緣該滿朝謁之日别聽仙曹施行臣萬死干冒天威陳情表具位臣某言臣謹取今月二十三日具表詣闕謝恩陳情者臣伏以性由天賦智愚善惡付之天人與道俱折旋俯仰合乎道何隂界置幽冥之府而上靈立賞罰之司身形隨氣數以爲生命運與星辰而相隸實匪自然而生死疑其皆出於隂陽天機不停物情易變冬歸而冰自泮春到而草俱青審皆氣之所陶故立性以爲主千燈照室同是一光大海含波中有萬變蓋有情無情之異與生數成數之殊然動靜皆非其本來彼想念盡形於已有形具以後道在其中惟得之者與之合眞其失之者宜乎沉惑所以啓修仙學道之路從而建正心誠意之門大道獨超乎死生至誠可回於造化存乎誠而合道得是道者皆誠此衆生所從入之塗誠列聖已常躋之域當究虚无之始實根事物之前以心契之即道也矣臣凡胎濁質走骨行尸氣所禀而有沖性所賦而不昧六根具足三際俱圓能辦菽麥於是非之間而泯薰藉於榮辱之外處動靜靜動咸靜之靜明色空空色已空之空知六識之無根照七情之如夢鑒血肉以醉其性思形質以窒其神早馳逐於玄關尚彷徨於道閫性者信也神而通之恭惟高上神霄玉清眞王長生大帝玉陛下金闕眞皇玉清上帝心含大梵手握混元浩浩難名巍巍莫及慈悲群品統御庶頁恩惠十方鑒觀萬國臣特一螻蟻之體敢鳴蚯蚓之聲夙戴洪私久霑霈濡凡伸懇禱悉荷感通幸聞道於一日之先獲修眞於萬劫之下謹述操存之漸式陳修證之初自惟顓蒙宻希訓化庶可以糞壤之姓字得陪於霄極之臣僚僣具表文仰干睿聽臣故作誤爲之罪願垂寬大之恩暫起復滅之心克合沖虚之妙所行雷部之法所掌霆司之章輔正除邪濟生度死三司將吏咸歸役使之權五部風雷緫屬招呼之令或寸功片善可録於金簡則微臣小子終到於瑶京雖蓬生麻中不扶自直然魚伏水内非養則枯謂皆鶴長鳧短之云亦有蛇化蟬蜕者也臣愚干冒天威不勝昧死謹具表奏以聞臣誠惶誠恐與彭鶴林書丁丑九月十四日玉蟾將如泉山乃告吾友鶴林眞官曰比作别未久此心甚悵怏也契兄欲學仙非庸常輩比且知有萬法歸一之理而不爲諸家所愚此前古之聖賢用心近代希有如此去道不遠不仙而何章希玉口中語有謂一階正法一階祕法一階妙法法法常在心更無别法其語雖麤率誠有以哉向相見之初便以金丹大藥相期特時節夤緣未到耳今日有期大信不約且如曩日倡和有虎皮竹籜泰華冠之句今道位泰華丹景吏乃悟前日之詩便作今日相期待也凡事宜珍重聖事宜珍重一切事宜珍重已是多口了也呵呵祕閣吏部幸與致意蘂珠居士能信得及能行是事否前所囑今冬來春安歇處只是天開圖畫亦好或來春稍爽是盟亦不多時可相見也時間不須苦以符圖留意幸養心焉否則將前後所得之法録成部帙束之高閣但與鞠郝作頭對則一切事簡而又靈異今但於二使者香爐前以某符一道常用之或鎮或貼或吞或帶隨所禱而用之無徃不利亦不須多念呪也此無他不過只是心與神會用之則靈耳呪水但以一簡易呪呪之恰如眞龍但一滴水便作滂沛豈用如許繁耶紙脩不覺縷縷思之思之時寓紫樞樓書玉蟾九月十四日自螺江泝潮而南以十八日次泉山不勝役役幸形神少寧又起三山故舊之思尚須少槃桓却作漳濱客也前者來春之盟斷不爽但且味道自娱常時惟香燭將吏外不過一符一水愈疾郤邪而已此是代天行化之本㫖令閤蘂珠令器同侍吏部壽仙日想清逸恨不曾過城東新菴爲一杯茶耳此願須欲償也學道之士申愆省非之外一有小坎𡒄惟順受爲懷惟道所在豈人間事足爲吾人喜憂耶蓬萊水又清淺矣其桑田平回首舊時路丁丑秋蜕仙菴書某戊寅三月十五日寓江州太平興國宫作書附致鶴林眞士賢弟頃嘗三遺書曾達否日來道法想精進法力又勝前也鞠郝二符吏亦效職否不審尊府吏部壽體康樂令閭蘂珠居士令嗣承奉各惟安慶鄙人今春水陸二千餘里尋隱廬山幸而四大輕爽凡事亦隨順但花晨月夕杯酒爐香頗爲我南中諸友感懷也而於老友又甚酸心焉物外人或凡或聖不以榮辱爲心毁譽爲念惟木精石怪知其爲如何人也大道歌仙系圖必刊板流廣矣喜甚喜甚老友更加鞭爲禱兹不多及珍重珍重瓊山老人白某謹書十月二十一日瓊山老叟白某致書福州鶴林眞士彭卿治所今春到江州行興國軍如岳陽回豫章過撫州謁華蓋山下臨江軍取道饒信而淛東以八月一日詣行在復遊紹興過慶元府再歸臨安十月二十日偶閑行忽與蕭潜菴遇乃知了菴已化如菴已歸祥山紫壼在蟄仙無恙寧國屢相昭更不徃見史揆任樞各有夤緣可以謁之此興甚懶亦各休休每日惟以大飲酣歌餞時光而已他無所求亦無所思惟是吾鶴林此吾愛子遠在二千里外伏惟即日上侍府丈吏部老仙與蘂珠小道生俱懽慶潜菴能道一二甚以爲慰此間狂怪自樂人亦視以爲常但國録家叔甚訝其非耳今所行之法尚更靈在偶醉了失身墮西湖水中法印爲有矣亦可發一大笑欲徃天台臨行呼潜菴授之以此南望多凝黯尺紙不宣某書致某再拜上覆鶴林眞人尊友忨愒湖山轉盻許時忽辱伻來甚慰三秋之别欣審槐屯奏凱養鍊餘閑風霆在馭台候起居萬福蘂珠侍經均禧某蒙示以清靜經夾頌字字詣道言言契眞雖荷竄易見囑然已諦當實無可指斥者源泉混混不舍晝夜及其至焉放乎四海其尚相期乎大方之家也餘惟珍䕶嗣此有可見示勿外幸幸某上覆某𡞦然一影黄塘分携君隨南去鴈我逐比飛雲桂山荷沼風館月臺昨夕今宵殆是夢事顧子何物夙承心知事之以師禮邁所怙若爲補報克稱殷隆每一尋省輒復耳熱神霄歸路距今十年鶴杳鸞㝠對秋生感便欲呼黄鵠騎紫煙前驅風霆兵後擁青龍旛奈何貼身之塵債未償入骨之業緣未斷但且逆風把柂遡洄從之殊途同歸未始非道糟哺醨啜秪益自穢急流打網正可得魚一世所遭莫君若也君今淵乎其似道矣惟不疑所以氣備惟無畏所以神全故不疑則眞中有神故無畏則誠外無法朝熏暮習垕積仙勳順受世緣還歸玉府愈加進進用敢勉旃勿謂今曰矣而有翌日今年矣而有明年今生矣而有來生今身矣而有後身殊不知上床燈滅鞋履相違明年乎翌日乎父不信子手不信懷後身乎來生乎君須戮力勿視我爲我或飄淪君爲可恃臨紙咽塞此别須長水闊雲遥蒼蒼爲黯諸自愛押付彭鶴林某拜覆鶴林眞人賢高弟春事秀婉水暖花香在途粗適無煩介念去年迫於除夕遂即筆架山過今正旦於是申奏諸天祭饗諸神已於當日忝受九天應元雷聲普化天尊門下紏録典者簽押雷霆都司鬼神公事仍受上清驅役鬼神寳印印文納上至可收寘治靖也今老者過自康廬若無所見聞且莫發書恐有浮沉秋末冬初斷可再會雷霆玉經想已刊了可施十本以傳江西之士滿懷仰仰時中宜以道自處以法自勤即前天官之拜楊伯子正月五日專人賫劄子并絶句二古風一情文頗恭併此録至餘不宣某拜覆某上覆鶴林雷令判官蘂珠侍經一間仙璚三更杓指已深郷止況久違離哉舊嘗記得一相知領雷州之日初交割時有大卵甚異其大如斗以上至今留之因是名以雷州人謂此即陳鸞鳳之胞然亦異哉陳果何物而弗爲五方蠻雷都總管哉今吾二人亶是不凡者某名簉西臺之籍身塵玉府之斑夙命玄圖骨相有分縱復不德死還本曹遡想前生亦無大過自此還盡世緣順償業債年月該滿促歸舊司必矣是亦私有所恃也君信之愈篤愛之尤深忝獲同寅且非異道惟冀廣儲功行即前仙階勿視某以爲勤惰也始終見信幸用斯語夫卯屬震震爲雷而西臺屬金金在西方而剋制東震乃金剋木也故凡起雷必西臺爲命令之所由出令之人爲雷部官員者不知有玉樞不知有仙都不知有西臺徃徃多爲使院都司以下官至其謝世之日無功行則已使有功行入爲雷官則其卑污重難不可勝道如何酆都法之人殁爲鬼官之類也君所補所授已在仙都之與西臺矣某知君有可仙之資者何也以有可仙者有七一則妻子債輕世緣淡泊二則賦性沖靈識事幾先三則眼髮骨相如林侍晨四則心專一司如人放箭五則旦夕焚修救治無缺六則動與道合無甚違眞七則所得已圓年事未艾等而上之何所不至哉某少竢泉人之至即行矣或相約於江汭以何日爲别可也從此一向爲定身之計然其在世亦無幾年矣緬懷二仙述事論心不覺縷縷如許貴聚尊穉併煩起居八月五日某上覆先生海瓊集頃嘗累次傳之久矣載念襄歲丁丑暮春師轅南游得遂瞻禮由是雲鶴徃來每一叅際必有少憩日侍丈席聞所未聞無非分别正邪發揚玄妙返而筆之粲然盈帙自惟衰朽有負師訓不敢終祕併以升堂小叅歌頌等作釐爲四卷同壽諸梓庶爲學海之筌蹄抑以開人天之耳目實區區之願也峕淳祐辛亥季冬甲子鶴林彭㭒稽首敬書右數語乃白祖師上足弟子彭鶴林眞人所作眞人乃三山巨族茅山楊許長史之流也是編皆囑付授受眞人之言僕舊得本乃福州天慶本卷末有眞人跋語如此因重抄于右以足是書蓋乃大常齋蔣法師所藏也得祖師景霄大法多用鞠郝二將此文備載其目是書竒祕彭公所謂開人天眼目是也學者宜熟味當有所得也歲在壬寅七月十八日叅學上清三洞經籙大羅輔化仙卿九天雷門祭酒方從義再拜謹書海瓊白眞人語録卷之四, CK-KZ: 落}
