  - {type: variant, offset: 1031, length: 3, content: 欺賢罔, CK-KZ: 謂憐兒不覺醜今辰莫有向行坐中得見悟眞篇麽縱饒得見悟眞篇抑且不識張平叔諸人如魚飲水冷暖自知還知薛眞人旣是了達禪宗如何又就金丹窠臼裏腦門著地若識得破天下無二道}
