  - {type: variant, offset: 1192, length: 392, content: 與我形貌亦如然翻思塵世學道者三年九載空遷延依前雲水遊四海冷眼看有誰堪傳炷香問道仍下風勘辨邪正知愚賢歸來作此翠虚吟猶如杲日麗青天掃除末學小伎術分别火候鍊藥物只取一味水中金收入虚無造化窟促將百脉盡歸源脉住氣停丹始結初時枯木依寒巖二獸相逢如電掣中央正位産玄珠浪靜風平雲雨歇片餉之間見丹頭軟如綿團硬似鐵此是南方赤鳳血採之須要知時節一般纔得萬般全復命歸根眞孔穴内中自有眞壺天風物光明月皎潔龍吟虚嘯鉛汞交灼見黄芽并白雪每常天地交合時奪取隂陽造化機卯酉甲庚須沐浴弦望晦朔要防危隨日隨時則斤兩抽添運用在怡怡十二時中只一時九還七返這些兒温養切須常固濟巽風常向坎中吹行坐寢食緫如如惟恐火冷丹力遲一年周天除卯酉九轉工夫日用九至於十月玉霜飛聖胎圓就風雷吼一載胎生一箇兒子生孫了又孫枝千百億化最妙處豈可容易教人知忘形死心絶爾汝存亡動靜分賔主朝昏藥物有浮沉水火爻符宜檢舉眞氣薰蒸無寒暑純陽流溢無生死有一子母分胎路, CK-KZ: ''}
