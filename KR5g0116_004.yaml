front:
  text: 海瓊白真人語録卷之四并四
  hash: sha256:9cae06c8441c0399b98a962f6badc8d0438c72f71d4cbf37de3e22294ed771e5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0116_HFL_004-001a, image: hfl/1016/1016-132.png}
body:
  text: 泥丸真人羅浮翠虛吟嘉定壬申八月秋翠虛道人在羅浮眼前萬事去如水天地何似一浮漚吾將蛻形歸玉闕遂以金丹火候訣説與瓊山白玉蟾使之深識造化骨道光禪師薛紫賢付我歸根復命篇指示鉛汞兩箇字所謂真的玄中玄辛苦都來只十月漸漸採取漸凝結而今通身是白血已覺四季無寒熱後來依舊去參人勘破多少野狐精箇箇不知真一處總是旁門不是真恐君虛度此青春從頭一一為君陳若非金液還丹訣不必空自勞精神有如迷者學採戰心心只向房中戀謂之隂丹御女方手按尾閭吸氣咽奪人精血補吾身執著三峯信邪見産門唤作生身處九淺一深行幾遍軒后彭祖老容成黃谷壽光趙飛燕他家别有通霄路酒肆淫坊戲歷鍊莫言花裏遇神仙却把金篦换瓦片樹根已朽葉徒青氣海波翻死如箭其他有若諸旁門尚自可結安樂緣有如服氣為中黃有如守頂為混元有如運氣為先天有如咽液為靈泉或者脾邊認一穴執定謂之呼吸根或者口鼻作玄牝納清吐濁為返還或者默朝高上帝心目上視守泥丸與彼存思氣升降以此謂之夾脊關與彼閉息吞津唾謂之玉液金液丹與彼存神守臍下與彼作念想眉間又如運心思脊骨又如合口拄舌端竦肩縮頸偃脊背唤作直入玉京山口為華池舌為龍唤作神水流潺潺此皆旁門安樂法擬作天仙豈不難入十放九咽其一聚氣歸臍離胎息手持念珠數呼吸水壺土圭測時刻或依靈寶畢法行勒尾閭兮咽津液或參西山會真記終日無言面對壁時人雖是學坐禪何曾月照寒潭碧時人雖是學抱元何曾如玉之在石或言大道本無為枯坐灰心孤默默或言已自領現成試問幻身何處得更有勞形採日月謂是天魂與地魄更有中宵服七曜謂是造化真血脈更有肘後飛金晶氣自騰騰水滴滴更有太一舍真氣心自冥冥腎寂寂有般循環運流珠有般靜定想朱橘如斯皆是養命方即非無質生靈質道要無中養就兒箇中别有真端的都緣簡易妙天機散在丹書不肯泄可憐愚夫自執迷迷迷相指盡無疑箇般鬼怪顛狂輩坐中挑動顫多時屈伸偃仰千萬狀啼笑叫唤如兒嬉蓋緣方寸無主人氣虛氣散神狂飛一隊妄人相唱鬨以此誑俗誘愚癡不知與道合其真與鬼合邪徒妄為一才心動氣隨動跳躍顫掉謂神機或曰此是陽氣來或曰龍虎爭戰時或曰河車千萬巿或曰水火相奔馳看看搖感五臟氣一旦走泄精神羸當初聖祖留丹訣無中生有作丹基何曾有此鬼怪狀盡是下士徒闡提我聞前代諸聖師無為之中無不為盡於無相生實相不假想化并行持别有些兒竒又竒心腎元來非坎離肝心脾肺腎腸膽只是空屋舊藩籬唾涕精津氣血液只可接助為階梯精神魂魄心意氣觀之似是而實非何須內觀及鑑形或聽靈響視泓池吞霞飲露服元氣功效不驗心神疲更説清虛弄爐火索人投狀賫金寶敢將蛙井藐滄溟元始天尊即是我虛粧銜號偽神通指劃鬼神説因果今朝明朝又奏名內丹外丹無不可欺賢罔聖昧三光自視禍福皆懡㦬招邀徒弟走巿鄽醉酒飽肉成群火大道從來絶名相真仙本自無花草教他戒誓去辛勤爭如汝自辛勤好一人迷昧猶自可迷以傳迷迷至老此輩一盲引衆盲共入迷塗受憂惱忽朝福盡業報來獲罪於天無所禱堪嗟舉世喜學仙幾人務實為真詮古賢好語切須記工夫純熟語通仙言語不通非眷屬工夫不到不方圓我昔工夫行一年六脈已息氣歸根有一嬰兒在丹田與我形貌亦如然翻思塵世學道者三年九載空遷延依前雲水遊四海冷眼看有誰堪傳炷香問道仍下風勘辨邪正知愚賢歸來作此翠虛吟猶如杲日麗青天掃除末學小伎術分别火候鍊藥物只取一味水中金收入虛無造化窟促將百脈盡歸源脈住氣停丹始結初時枯木依寒巖二獸相逢如電掣中央正位産玄珠浪靜風平雲雨歇片餉之間見丹頭軟如綿團硬似鐵此是南方赤鳳血採之須要知時節一般才得萬般全復命歸根真孔穴內中自有真壺天風物光明月皎潔龍吟虛嘯鉛汞交灼見黃芽并白雪每常天地交合時奪取隂陽造化機卯酉甲庚須沐浴弦望晦朔要防危隨日隨時則斤兩抽添運用在怡怡十二時中只一時九還七返這些兒溫養切須常固濟巽風常向坎中吹行坐寢食總如如惟恐火冷丹力遲一年周天除卯酉九轉工夫日用九至於十月玉霜飛聖胎圓就風雷吼一載胎生一箇兒子生孫了又孫枝千百億化最妙處豈可容易教人知忘形死心絶爾汝存亡動靜分賔主朝昏藥物有浮沉水火爻符宜檢舉真氣薰蒸無寒暑純陽流溢無生死有一子母分胎路妙在尾箕斗牛女若欲延年救老殘斷除淫欲行旁門果將留形永住世除非運火鍊神丹神丹之功三百日七解七蛻成大還聚則成形散成氣天上人間總一般寧可求師安樂法不可邪淫採精血古云天地悉皆歸須學無為清靜訣縛住青山萬頃雲撈取碧潭一輪月玄關一竅無人知此是刀圭甚竒絶夜來撞見吕秀才有一丹訣猶竒哉却把太虛為鼎爐活捉烏兔為藥材山河大地發猛火於中萬象生風雷昔時混沌今品物一時交結成聖胎也無金木相間隔也無龍虎分南北不問子母及雌雄不問夫婦及黑白何人名曰大還丹太上老君吞不得老君留與清間客服了飛神登太極更將一盞鴻濛酒餌此刀圭壯顔色任從滄海變桑田我道壼中未一年縣知汝心如鐵堅所以口口密相傳妙處都廬半句子神仙法度真自然速須下手結胎仙朗吟歸去蓬萊天海瓊君萬法歸一歌金丹大藥妙無窮一點丹頭內外紅真汞真鉛才入手片時伏虎活擒龍黃婆聘入丁公舍巽位吹噓九轉功十月胎圓離坎外紫雲飛出玉爐空短褐包巾滿廛巿尋草燒茅烹藥匱自己三黃及四神誰知安竈烹爐意紙襖麻衣要隱山餐松飲水守飢寒日魂月魄空呼吸到底方知入道難黑山山下鬼窟裏背曲頭垂口流水夢中夢見夢中人幾時待得硫黃死薄福癡人不斷淫尾閭閉了採他隂元精搖撼無墻壁錯認黃泥唤作金容成三峯學御女採精吸與葉眼乳大道本火無隂陽勞形著相徒自苦叩齒吞津咽氣聲轆轤空動髑髏形妄將口鼻為玄牝謾説金晶肘後盈鼻頭閉息空畫餅幾人日中逃得影客風邪氣肚中鳴安得靈砂長在鼎參禪見性契真如莫道無心便靠虛悟了不行乾智慧千崖萬壑涉程途多少老儒學周易豈知太極歸無極忘形便欲任天真只恐春歸草無力眀教專門事滅魔七時功德便如何不知清淨光眀意面色痿黃空自勞胡氏陽山一果祖九返莊嚴皆妄語手執金環運三車阿誰飛上金天去更有持齋四果徒九曲江頭下鐵符乳香燒盡難成佛精血元陽般運枯三千六百旁門術開頂縮龜習定息存想丹田鍊五芽吐故納新虛費力禮塔焚香誦藏經更能拜斗與瞻星吞符飲水專持呪恁地如何得道成注想按摩八段錦嘻呵六字拘興寢若要還精補腦時除非一盞醍醐飲雙眼遙思運頂門戲言日月照崑崙那堪又見圓光現便指天尊與世尊眼本無光人妄想耳本無聲那得響上有太淵下霐池妄指中黃忍肚飢空按周天行卦數幾曾識得真龍虎苦識真龍真虎人了得向上一條路暗把簞瓢服小便吐吞涎唾作珠圓鼻頭流出兩條涕便敢呼為玉筋仙説盡存三守一底九年鍊丹思想裏忘抑家珍向外尋百年故箇隂靈鬼天門枸杞與黃精豆杏薑椒田茯苓未委地仙成也未皮焦肉腐可憐生齋醮關宣歌梵曲分環破券授科籙不識天心兩字真只會三光符水熟袖中雷印嚇山精手把楊枝學隱形此心本是通神藏一念差時萬狀生此身身外皆隱物此心心外皆妖術身裏真心心裏身不在中間內外出這些金液大還丹自從元谷至泥丸抽添七返無多事草木無心天地間真根真蒂結真酥真鼎真壇真藥爐陽日起頭隂日積分明陽火與隂符半畝丹田種金粟一朵靈芝香馥郁鐵牛哮吼入綿厨木馬奔馳跳金屋乾坤二八結丹砂滿鼎溶溶白雪花捉住龜蛇歸兩手山頭玉兔化金鴉還丹有訣知音少汞龍鉛虎憑火候三千刻內結嬰兒調和溫養終無漏遍體渾如一片瓊寒蟾光照玉壼冰頊門夜半雷聲吼巿地清風神鬼驚天上人間真妙訣誰敢天機私漏泄須是英雄大丈夫了然胸中無一物一陽才動大丹成片餉上夫造化靈秪恐南宫録姓名醉騎白鶴朝上清勸道文一作白日銘嗟夫人身如無根樹惟憑氣息以為根株百歲光隂如夢相似出息不保入息今朝不保來朝虛度歲時忽然老死百骸漬散四大分離神識昏迷散墮諸趣不知來世又得何身生死輪回劫劫不息迷不知悟懶不知勤而今既到寶山切莫去時空手到老依前病死枉向人間一遭各宜勉力下死工夫古語云辛勤一二年快活千百劫從今收拾一意無他眼不外觀耳不外聽節飲食省睡眠絶笑談息思慮把茅蓋頂莫求安適煮米療飢莫分微惡如蟬飮露體自輕清如龜吸日壽乃延長苦能餐松啖柏戴笠披簑巖下眠雲洞前飲水猶是作家人也如其未有力量旦且漸學古賢苟不如是修行則是無此福分朝收暮採日鍊時烹如龍養珠如雞抱卵火種相續打成一片至於子母相見不亦樂乎傳法明心頌彭鶴林萬法從心生心心即是法語默與動靜皆法所使然無疑是真心守一是正法守一而無疑法法皆心法法是心之臣心是法之主無疑則心正心正則法靈守一則心專心專則法驗非法之靈驗蓋汝心所以黃籙借職奏狀地下得道奉法童子臣白某右臣夙以高皇帝王神氣在身不昧靈根知有此事曩生修習今生遭逢叨綰雷章粗眀教法惟是臣自知太上大道慈父聖母十方諸君丈人每垂赦宥臣以故亦多懶慢終年不修香火其在仙籍殆若無臣臣所以又敢冒昧奏聞臣亦有説是臣此身皮毛骨血涕淚涎沫不能成真臣有一靈之天本來之性元命之神神而無方大不可測可以上賔帝梵立侍玉晨臣雖懶慢而帝真知之雖鬼神亦無如之何也矣臣曩歲警覺今凡得道奉法之士所有銜位並係偽稱若在天司别有品配臣今以草土彭耜為父演建黃籙令臣關啓臣既不可辭乞時暫以高上神霄玉清府雷霆令統五雷將兵提領雷霆都司鬼神公事攝行上清黃籙使臣俟醮筵滿日仍舊解職若遇役使風雷區别人鬼只乞以從上雷銜借稱臣世緣該滿朝謁之日别聽仙曹施行臣萬死干冒天威陳情表具位臣某言臣謹取今月二十三日具表詣闕謝恩陳情者臣伏以性由天賦智愚善惡付之天人與道俱折旋俯仰合乎道何隂界置幽冥之府而上靈立賞罰之司身形隨氣數以為生命運與星辰而相隸實匪自然而生死疑其皆出於隂陽天機不停物情易變冬歸而冰自泮春到而草俱青審皆氣之所陶故立性以為主千燈照室同是一光大海含波中有萬變蓋有情無情之異與生數成數之殊然動靜皆非其本來彼想念盡形於已有形具以後道在其中惟得之者與之合真其失之者宜乎沉惑所以啓修仙學道之路從而建正心誠意之門大道獨超乎死生至誠可回於造化存乎誠而合道得是道者皆誠此衆生所從入之塗誠列聖已常躋之域當究虛無之始實根事物之前以心契之即道也矣臣凡胎濁質走骨行尸氣所稟而有沖性所賦而不昧六根具足三際俱圓能辦菽麥於是非之間而泯薰藉於榮辱之外處動靜靜動咸靜之靜明色空空色已空之空知六識之無根照七情之如夢鑒血肉以醉其性思形質以窒其神早馳逐於玄關尚倣徨於道閫性者信也神而通之恭惟高上神霄玉清真王長生大帝玉陛下金闕真皇玉清上帝心含大梵手握混元浩浩難名巍巍莫及慈悲群品統御庶頁恩惠十方鑒觀萬國臣特一螻蟻之體敢鳴蚯蚓之聲夙戴洪私久霑霈濡凡伸懇禱悉荷感通幸聞道於一日之先獲修真於萬劫之下謹述操存之漸式陳修證之初自惟顓蒙密希訓化庶可以糞壤之姓字得陪於霄極之臣僚僣具表文仰干睿聽臣故作誤為之罪願垂寬大之恩暫起復滅之心克合沖虛之妙所行雷部之法所掌霆司之章輔正除邪濟生度死三司將吏咸歸役使之權五部風雷總屬招呼之令或寸功片善可録於金簡則微臣小子終到於瑶京雖蓬生麻中不扶自直然魚伏水內非養則枯謂皆鶴長鳧短之云亦有蛇化蟬蛻者也臣愚干冒天威不勝昧死謹具表奏以聞臣誠惶誠恐與彭鶴林書丁丑九月十四日玉蟾將如泉山乃告吾友鶴林真官曰比作别未久此心甚悵怏也契兄欲學仙非庸常輩比且知有萬法歸一之理而不為諸家所愚此前古之聖賢用心近代希有如此去道不遠不仙而何章希玉口中語有謂一階正法一階祕法一階妙法法法常在心更無别法其語雖粗率誠有以哉向相見之初便以金丹大藥相期特時節夤緣未到耳今日有期大信不約且如曩日倡和有虎皮竹籜泰華冠之句今道位泰華丹景吏乃悟前日之詩便作今日相期待也凡事宜珍重聖事宜珍重一切事宜珍重已是多口了也呵呵祕閣吏部幸與致意蘂珠居士能信得及能行是事否前所囑今冬來春安歇處只是天開圖畫亦好或來春稍爽是盟亦不多時可相見也時間不須苦以符圖留意幸養心焉否則將前後所得之法録成部帙束之高閣但與鞠郝作頭對則一切事簡而又靈異今但於二使者香爐前以某符一道常用之或鎮或貼或吞或帶隨所禱而用之無往不利亦不須多念呪也此無他不過只是心與神會用之則靈耳呪水但以一簡易呪呪之恰如真龍但一滴水便作滂沛豈用如許繁耶紙修不覺縷縷思之思之時寓紫樞樓書玉蟾九月十四日自螺江泝潮而南以十八日次泉山不勝役役幸形神少寧又起三山故舊之思尚須少槃桓却作漳濱客也前者來春之盟斷不爽但且味道自娛常時惟香燭將吏外不過一符一水愈疾郤邪而已此是代天行化之本旨令閣蘂珠令器同侍吏部壽仙日想清逸恨不曾過城東新菴為一杯茶耳此願須欲償也學道之士申愆省非之外一有小坎𡒄惟順受為懷惟道所在豈人間事足為吾人喜憂耶蓬萊水又清淺矣其桑田平回首舊時路丁丑秋蛻仙菴書某戊寅三月十五日寓江州太平興國宫作書附致鶴林真士賢弟頃嘗三遺書曾達否日來道法想精進法力又勝前也鞠郝二符吏亦效職否不審尊府吏部壽體康樂令閭蘂珠居士令嗣承奉各惟安慶鄙人今春水陸二千餘里尋隱廬山幸而四大輕爽凡事亦隨順但花晨月夕杯酒爐香頗為我南中諸友感懷也而於老友又甚酸心焉物外人或凡或聖不以榮辱為心毁譽為念惟木精石怪知其為如何人也大道歌仙系圖必刊板流廣矣喜甚喜甚老友更加鞭為禱兹不多及珍重珍重瓊山老人白某謹書十月二十一日瓊山老叟白某致書福州鶴林真士彭卿治所今春到江州行興國軍如嶽陽回豫章過撫州謁華蓋山下臨江軍取道饒信而浙東以八月一日詣行在復遊紹興過慶元府再歸臨安十月二十日偶間行忽與蕭潛菴遇乃知了菴已化如菴已歸祥山紫壼在蟄仙無恙寧國屢相昭更不往見史揆任樞各有夤緣可以謁之此興甚懶亦各休休每日惟以大飲酣歌餞時光而已他無所求亦無所思惟是吾鶴林此吾愛子遠在二千里外伏惟即日上侍府丈吏部老仙與蘂珠小道生俱歡慶潛菴能道一二甚以為慰此間狂怪自樂人亦視以為常但國録家叔甚訝其非耳今所行之法尚更靈在偶醉了失身墮西湖水中法印為有矣亦可發一大笑欲往天台臨行呼潛菴授之以此南望多凝黯尺紙不宣某書致某再拜上覆鶴林真人尊友忨愒湖山轉盻許時忽辱伻來甚慰三秋之别欣審槐屯奏凱養鍊餘間風霆在馭台候起居萬福蘂珠侍經均禧某蒙示以清靜經夾頌字字詣道言言契真雖荷竄易見囑然已諦當實無可指斥者源泉混混不舍晝夜及其至焉放乎四海其尚相期乎大方之家也餘惟珍護嗣此有可見示勿外幸幸某上覆某惸然一影黃塘分携君隨南去鴈我逐比飛雲桂山荷沼風館月臺昨夕今宵殆是夢事顧子何物夙承心知事之以師禮邁所怙若為補報克稱殷隆每一尋省輒復耳熱神霄歸路距今十年鶴杳鸞冥對秋生感便欲呼黃鵠騎紫煙前驅風霆兵後擁青龍幡奈何貼身之塵債未償入骨之業緣未斷但且逆風把柂遡洄從之殊途同歸未始非道糟哺醨啜秪益自穢急流打網正可得魚一世所遭莫君若也君今淵乎其似道矣惟不疑所以氣備惟無畏所以神全故不疑則真中有神故無畏則誠外無法朝熏暮習垕積仙勳順受世緣還歸玉府愈加進進用敢勉旃勿謂今曰矣而有翌日今年矣而有明年今生矣而有來生今身矣而有後身殊不知上床燈滅鞋履相違明年乎翌日乎父不信子手不信懷後身乎來生乎君須戮力勿視我為我或飄淪君為可恃臨紙咽塞此别須長水闊雲遙蒼蒼為黯諸自愛押付彭鶴林某拜覆鶴林真人賢高弟春事秀婉水暖花香在途粗適無煩介念去年迫於除夕遂即筆架山過今正旦於是申奏諸天祭饗諸神已於當日忝受九天應元雷聲普化天尊門下紏録典者簽押雷霆都司鬼神公事仍受上清驅役鬼神寶印印文納上至可收置治靖也今老者過自康廬若無所見聞且莫發書恐有浮沉秋末冬初斷可再會雷霆玉經想已刊了可施十本以傳江西之士滿懷仰仰時中宜以道自處以法自勤即前天官之拜楊伯子正月五日專人賫劄子并絶句二古風一情文頗恭併此録至餘不宣某拜覆某上覆鶴林雷令判官蘂珠侍經一間仙璚三更杓指已深鄉止況久違離哉舊嘗記得一相知領雷州之日初交割時有大卵甚異其大如斗以上至今留之因是名以雷州人謂此即陳鸞鳳之胞然亦異哉陳果何物而弗為五方蠻雷都總管哉今吾二人亶是不凡者某名簉西臺之籍身塵玉府之斑夙命玄圖骨相有分縱復不德死還本曹遡想前生亦無大過自此還盡世緣順償業債年月該滿促歸舊司必矣是亦私有所恃也君信之愈篤愛之尤深忝獲同寅且非異道惟冀廣儲功行即前仙階勿視某以為勤惰也始終見信幸用斯語夫卯屬震震為雷而西臺屬金金在西方而剋制東震乃金剋木也故凡起雷必西臺為命令之所由出令之人為雷部官員者不知有玉樞不知有仙都不知有西臺往往多為使院都司以下官至其謝世之日無功行則已使有功行入為雷官則其卑污重難不可勝道如何酆都法之人殁為鬼官之類也君所補所授已在仙都之與西臺矣某知君有可仙之資者何也以有可仙者有七一則妻子債輕世緣淡泊二則賦性沖靈識事幾先三則眼髮骨相如林侍晨四則心專一司如人放箭五則旦夕焚修救治無缺六則動與道合無甚違真七則所得已圓年事未艾等而上之何所不至哉某少俟泉人之至即行矣或相約於江汭以何日為别可也從此一向為定身之計然其在世亦無幾年矣緬懷二仙述事論心不覺縷縷如許貴聚尊稚併煩起居八月五日某上覆先生海瓊集頃嘗纍次傳之久矣載念襄歲丁丑暮春師轅南遊得遂瞻禮由是雲鶴往來每一參際必有少憩日侍丈席聞所未聞無非分别正邪發揚玄妙返而筆之粲然盈帙自惟衰朽有負師訓不敢終祕併以升堂小參歌頌等作釐為四卷同壽諸梓庶為學海之筌蹄抑以開人天之耳目實區區之願也峕淳祐辛亥季冬甲子鶴林彭耜稽首敬書右數語乃白祖師上足弟子彭鶴林真人所作真人乃三山巨族茅山楊許長史之流也是編皆囑付授受真人之言僕舊得本乃福州天慶本卷末有真人跋語如此因重抄于右以足是書蓋乃大常齋蔣法師所藏也得祖師景霄大法多用鞠郝二將此文備載其目是書竒祕彭公所謂開人天眼目是也學者宜熟味當有所得也歲在壬寅七月十八日參學上清三洞經籙大羅輔化仙卿九天雷門祭酒方從義再拜謹書海瓊白真人語録卷之四
