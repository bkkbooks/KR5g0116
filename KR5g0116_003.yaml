front:
  text: 海瓊白眞人語録卷之三并三
  hash: sha256:1d188c55beb816fc35918b395dc93549986130b6f5c9b5a2e5a19afdf72df86b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0116_HFL_003-001a, image: hfl/1016/1016-092.png}
body:
  text: 武夷升堂門人煙壺葉古熙等録此一瓣香混沌未判前萌芽龍漢新元初枝葉無隂陽地龍盤虎踞得乾坤外雨洒風吹崑崙山上蘂不花華池水邊樹無影濃煙非色薰透太清頂門瑞藹無聲化入元始鼻孔持起則妖魔膽碎焚時則籟動風鳴方知道釋迦親手栽培孔子無心採取全太極未分之氣乃虚空不死之根爇向爐中恭爲先聖先師出言吐氣上祝一人有慶萬國咸寧六府孔修百揆時叙遍天地皆是大羅聖境盡山川同作玄都玉京莫有學道眞人知常高士疑團未剖智鎖未開凡聖同共一隻眼看賢愚共開三十舌問所謂是列三玄戈甲布八極弓矛見義若不爲夫何勇之有天谷問曰大道本無名因甚有鉛汞師答云顯無形之形者大道之龍虎露無名之名者大道之鉛汞復問曰五金之内鉛中取銀八石之中砂中取汞修鍊内丹如何答云鉛中之銀砂中汞身内之心隂内陽雪巖問曰藥物有浮沉清濁火候有牰添進退運用在主賔生旺在刑德此理如何師答云終日採大藥何處辨浮沉終日行火候誰人知進退五行全處無生剋四象和時不主賔復問曰前弦後弦金數水數二八十六爲一斤藥何方採取何地烹鍊答云前弦金數後弦水數採得一斤烹一斤谿翁問曰師指所授本是大道弟子所傳又學金丹未審大道與金丹是同是别師答云渡河須是筏到岸不須船復問曰金丹之學在乎藥物爲先藥物之用在乎火候爲要何者爲藥物何者爲火候師答云藥物陽内隂火候隂内陽會得隂陽㫖大藥一處詳孤菴問曰眞鉛眞汞眞虎眞龍不知是何物丁公黄婆嬰兒姹女不知作何用師答曰會得本來三二一不會依前一二三復問曰鉛本屬北何曰金鉛汞本屬南何曰木汞答曰女子着青衣郞君披素練篠泉問曰龍哈虎嘯既非口鼻之間夫唱婦隨不在心腎之内汞既非離鉛既非坎兊不爲虎震不爲龍正在迷塗願求丹訣師答云坎離謾想心和腎震兊休尋肺與肝了得隂陽兩箇字天然夫婦虎龍盤復問曰唾涕精津氣血液鍾離言是屬隂涕唾精血腦氣神王鼎汞爲七返未審此理如何解會答云鑿石方逢玉默菴問曰金丹未成如何是有龍虎金丹已成如何是無龍虎師答云始於有物無人識乃至無形有處知復問曰滿堂渾是客誰是主人翁答云一字兩字重千聖擔不起煙壼問曰金丹之道在易則乾坤坎離在天則斗箕日月在丹則龍虎水火在藥則鉛銀砂汞在人則夫婦男女不過曰隂陽二字愚已知之矣所謂太極眞土此爲何義師答云千峯勢到嶽邊止萬派聲歸海上消紺雲問曰夫欲鍊金丹者須洞曉隂陽深明造化方能追二氣於黄道會三性於元宫攢簇五行合和四象如何是金丹之㫖師答云金者天發殺機丹者虚中有象復問曰大道本無物如何可譬喻答曰談河難濟渴復問曰大道本一理如何有分别答云畫餅不充飢復問曰可謂是似玉在石未曾開今日忽然光爍爍答云清風與明月凡聖盡沾恩持綱云大道無形大丹無色動中靜靜中動動靜如如無内有有内無有無默默會得則本無迷悟不會則目有聖凡所以魏伯陽之河土姹女許旌陽之水上鐵舟鍾離權之金液還丹劉海蟾之玉華眞水如是則月圓月缺不離水雲去雲來何礙天結座云所以昔毗陵薛眞人向禪宗了徹大事然後被杏林眞人穿却鼻孔所謂千虚不博一實張紫陽云終日行未嘗行終日坐未嘗坐可謂憐兒不覺醜今辰莫有向行坐中得見悟眞篇麽縱饒得見悟眞篇抑且不識張平叔諸人如魚飲水冷暖自知還知薛眞人既是了達禪宗如何又就金丹窠臼裏腦門着地若識得破天下無二道聖人無兩心若識不破時唤侍者一聲侍者應喏師云早上喫粥了麽侍者云喫粥了師云好物不中飽人喫常州清醮升堂祝香罷師乃云雲從龍風從虎山鳴谷應響合影隨若是知音何妨漏泄僧問我音釋迦文佛曾爲忍辱仙人未審爲仙何似爲佛答云水向石邊流出冷風從花裏過來香進云恁麽則楞嚴經云十種仙人不得正覺又作麽生答云紅輪光爍爍爭奈覆盆何進云傅大士因甚却道饒經八萬劫終是落空亡𠰚答云有爲皆是幻無相乃爲眞進云四果仙人與五通仙人是同是别答云一等是麪由人造作進云必竟神仙何如般若答云眞論不换金進云且道老胡與老聃有何優劣答云必竟水須朝海去到頭雲定覓山歸進云如是則一點水墨兩處成龍答云鵝王擇乳素非鴨類進云還許作家漢向這裏打破藩籬得麽答云蝦跳不出斗僧禮拜道人問欲知火候通玄處須共神仙子細論答云潘閬倒騎驢進云君火臣火民火野火周天火卯酉火天罡火必竟如何是大藥火候答云金烏西沉玉兔東升進云聖人傳藥不傳火答云莫怪天機都漏泄皆縁學者大迷蒙進云衆生未悟如何指迷答云汝見無舌人解語麽進云如此則始於有作人皆見及至無爲衆始知也答云恍惚裏相逢杳㝠中有變進云所謂是灰心行水火定裏採眞鉛耶答云白鹿能飛步蒼龜解固形進云因是乃知藥中有火火中有藥也答云吾友高姓道人不告禮拜而去道士問承聞金丹大藥三千六百門養命數十家且如大道無傳必竟有箇相似底麽答云是進云夾脊雙關之理如何答曰頭垂背曲哀憐生進云默朝上帝如何答云用盡眼光存頂𩕳何曾夢見大還丹進云肘後飛金晶𠰚答云休將螢火爇須彌進云兩曜聚明堂又作麽生答云眉間有甚竒特處何不回心照絳宫進云上至泥九下至尾閭中有三田妙在何處答云離種種邊名爲妙道進云還是存麽答云不進云漱咽按摩想念存守呼吸閉固提挈勒縮必竟如何答云笑倒南嶽萬年松進云如何即是答云屙屎喫飯有什麽難進云莫是眞隂眞陽謂之道麽答云人能常清靜天地悉皆歸進云因甚順行逆行天莫測或是或非人不識𠰚答云一吟一醉一刀圭進云可謂人人有分箇箇圓成答云莫把黄泥唤作金道士禮拜士人問視之不見名曰希聽之不聞名曰夷希夷則不問且道如何是仰之彌高答云百尺竿頭一布巾進云鑽之彌堅𠰚答云分明題出酒家春進云瞻之在前又如何答云相逢不飲空歸去進云忽然在後答云洞裏桃花也笑人進云念兹在兹也答云君子謹其獨不可須臾離進云所謂是終日如愚答云甕裏不怕走了鱉士人禮拜師乃舉拂子打一圓相云三問三不答四問四不知如今費唇舌笑殺五須彌師復云適來僧問四果仙人與五通仙今是同是别也是竒時底問頭只今諸人還知五通四果之理麽五通魚入網四果兔游罝堪笑貪程者還郷不到家通五通兮果四果丙丁童子來求火新婦騎驢前家牽一似猢猻看水磨卓錫一下下座廬士升堂師陞座乃云過去無釋迦當來無彌勒疑殺天下人是賊方識賊道士出云見義若不爲夫何勇之有師曰將謂化冷毛士禮拜師曰若果有疑不須更問士云如何是太上第一義師曰急急如律令士云疑殺天下人師曰爲有五湖無范蠡致將几杖賜吴王士云清靜經既云大道無形因甚生育天地師曰一夜月生海幾家人倚樓士云大道無情因甚却運行日月師曰雲來山裹帽風起樹摇頭士云既是何道無名却又長養萬物此理如何師曰無風荷葉動决是有魚行士云天如何傾於西北師曰女媧皺却手士云地何故陷於東南師曰大爲不知源士云魚以水爲命因甚死在水裏師曰到頭霜用夜經寓人前塗縍師曰不信但觀潮進退士云死之徒十有三𠰚師曰何如更看月盈虧士云動之死地亦十有三𠰚師曰六隻骰子滿盤紅士云生死事大無常迅速又且如何師曰朝廷有道青春好士云帝得血流無用處不如緘口過殘春師曰太湖三萬六千頃士禮拜士退師乃云問到海變桑田答到衣磨劫石何曾夢見太上道終教笑殺成音王且道如何則是咄無人知此意令我憶南泉師復舉云五通問佛佛有六通因甚吾有五通佛云那一通你問我師却云大小釋迦被五通仙人輕輕捺𢭵眞得口眼喎斜敢問諸人那裏是釋迦老子敗闕處師有頌曰釋迦文佛五通仙鼻孔依然没半邊昨夜四更山吐月泥牛孔動四擇天師示衆云從生至死只是者箇條條倩你剥落各要洒洒而歸做得主把得定牢籠不肯住呼唤不回頭常光現前壁立萬仞孤迥迴峭巍巍圓陀陀光爍爍臨崖撒手自肯承當絶後再甦欺君不得苦能恁麽方説得人能常清靜天地悉皆歸所以道天地與我同根萬物與我同體無苦寂滅道無作上任滅且道作麽生道癡人面前不得説夢上堂云諸多學徒聽予宣演不可以知知不可以識識向不放長得在來日也上堂云拈起便會不會便休何故如此良久云父母所生口終不爲子説上堂云天下無難事都來心不專既是無難却又專心作麽若不專心一期不易此意如何大蟲看水磨上堂云無手人欲行拳時如何孝子喪父母時如何餓狗見熱油鐺時如何有人知得下落不妨同過喫茶上堂云一去無消息憐伊也恨伊聲聲聞杜宇謾道不如歸上堂云虚空有血混沌有骨爛泥裏有刺還會麽泥滑滑泥滑滑上堂云聞時富貴見後貧窮便道貧窮應未得一家六口日春風上堂云昨日失便宜達麽缺却當門齒今日得便宜趙州東壁挂葫蘆吽吽上堂云若便下坐上堂云雨兒似織絲絲知是從何出江水滔滔流向滄溟又作麽良久云你且道眉高幾尺眼闊幾丈上堂云更嫌何處不風流便下座平江鶴會升堂祝香問答罷師乃云問話且止問亦無窮答亦無盡一問一答復有何益縱有懸河之辯曾何擬議其玄微使皆飛屑之辭亦莫髣髴其要妙諸人還知麽混沌未判之初氣象何殊今日父母未生以前一生參學事畢粤自兩周之季始自三教之興孔氏則四端五常釋氏則三乘四諦老氏則三洞四輔若夫孔氏之教惟一字之誠而已釋氏之教惟一字之定而已老氏則清靜而已所謂是人能常清靜天地悉皆歸其在孔氏者豈不見云吾嘗終日不食終夜不寢終日如愚三月不違仁善養吾浩然之氣念兹在兹則其庶乎屢空也必矣夫爲道學者如何致君堯舜上再使風俗淳其在釋氏者豈不見云二六時中常光現前壁立萬仞如鷄抱卵常使暖氣不絶綿綿宻宻無令間斷則所謂臨崖潵手便肯承當絶後再甦欺君不得也必矣夫爲禪學者如何臨濟入門便喝有理不在高聲德山入門便棒打草只要蛇驚其在老氏者豈不見云洞曉隂陽深達造化追二氣於黄道會三性於元宫攢簇五行合和四象龍吟虎嘯夫唱婦隨玉鼎湯煎金爐火熾節候既周脫胎神化功成名遂身外有身也必矣夫爲仙學者如何牽將白虎歸家養産箇明珠似月圓必竟三教是同是别不知説箇何年事直至而今笑不休師復云日月如梭光隂如箭柳線牽將春色去荷錢買得夏風來隨朝開櫻筍之厨釋氏結蠟人之制十洲三島盡雲筒月筑之流四海五湖俱雨笠煙簑之客無限廛中散聖幾多物外高仙凡聖同居隱顯莫測叙謝不録結座云皇宋嘉定十四年秀葽紀月清和天湖山已還武林債風月復結姑蘇縁姑蘇其月十有四四衆共結純陽會純陽眞人此日生漂灘舊有仙游記我聞唐代吕純陽師是鍾離字雲房親傳金液還丹訣得道之時游荆襄世人還識純陽否鶴頸龜腮身弊垢或時磨鏡巿中行或時賣墨街頭走或稱姓田或姓回江口京口歸去來曾擔兩甕過廬阜復吹雙笛行天台青帽紅袍長爛飲袖有青蛇威凛凛洪都度得西山施霅川度得東林沈朝游百粤暮三吴形神聚散俄有無茶中傳授郭上竈酒裏點化何仙姑或衣白襴或紙襖一劒横空幾番倒大笑歸從投子山片言勘破黄龍老太平寺裏舊題詩三入岳陽知不知黄昏武夷拂衣去午夜君山翫月歸醉倒狂歌歌則舞一局碁錢幾今古清風明月黄鶴樓白蘋紅蓼湓江浦當年飲罷一刀圭誰信無中養就兒空存畢法十八訣未肯輕輕説與伊舊曾三舉嗟不第自言父是吕諫議囊中瑞約無藥銀天外徜佯乘劒氣先生劒法無人傳千變萬化常忽然天將間生生靈異四月純陽卦屬乾取將坎畫歸離腹化作純乾陽氣足故能御氣化飛龍所至度人留異躅平江此會異諸方獨是今年復異常徃歲㑹時常肹蠁雲端仙鶴日翺翔兹命野人陞此座未免從頭爲説破要須會得純陽心始堪學得純陽道道可道如何學撮土爲香未是眞知音自有張天覺東樓小參門人紫璚子趙奬録至道在心即心是道六根内外一般風光内物轉移終有老死元和默運可得長生是故形以心爲君心者神之舍心寧則神靈心荒則神狂虚其心而正氣凝淡其心則陽和集血氣不撓自然流通志意無爲萬緣自息心悲則隂氣凝心喜則陽氣散念起則神奔念住則神逸夫人之一身其心之神發於目而能視視久則心神離不在乎貪而喪心也腎之精發於耳而能聽聽久則腎精枯不在乎淫而敗腎也肝之魂發於鼻而能嗅嗅久則肝魂散不在乎嗔而損肝也膽之魄發於口而能言言久則膽魄死不在乎躁而暴膽也至道之要至靜以凝其神精思以徹其感齋戒以應其眞慈惠以成其功卑柔以存其誠心無雜念意不外走心常歸一意自如如一心恬然四大清適心不在耳孰爲之聲心不在目孰爲之色心不在鼻孰爲之香心不在口孰爲之言氣聚則飽神和則暖所以道心者氣之主氣者形之根形是氣之宅神者形之具神即性也氣即命也心靜則氣正正則全氣全則神和和則凝神凝則萬寳結矣施肩吾曰氣住則神住神住則形住必也忘其情而全其性也性全則形自全氣亦全道必全也道全而神則旺氣則靈形可超性可徹也返覆流通與道爲一上自天谷下及隂端二景相逢打成一塊如是久久渾無間斷變化在我與道合眞或者謂心動則神疲心靜則神昏一動一靜則不得無動無靜亦不得則必竟如何嬌如西子離金闕美似楊妃下玉樓日日與君花下醉更嫌何處不風流又眞師示㭒以頌曰三家村裏黄三嬸三更轉身失却枕打著阿家鼻孔頭明日起來尋蠣鋟咄春人飲春酒春棒打春牛㭒問曰此莫是歸根復命底道理麽師云父母所生口終不爲子説㭒又問曰此理如何師云鐵鏝頭上杏花紅㭒問未審還有些契合也無師云昨日街頭兩箇賣柴漢被人打折當門齒你因甚替他叫屈㭒云咦只是恁地師云你試道看㭒却頌曰鐵饅頭上杏花紅四面玲瓏處處通踏著稱鎚硬似鐵新羅只在海門東冬至小叅身中一寳隱在丹田輕如宻霧淡似飛煙上至泥丸下及湧泉乍聚乍散或方或圓大如日輪五色霞鮮表裏瑩徹左右回旋其硬如鐵其軟如綿其急如電其緊如弦重逾一斤飛遍三千遇隂入地逢陽升天金翁採汞姹女擒鉛依時運用就内烹煎冬至之後夏至之前金鼎湯沸玉爐火然龍吟東嶽虎嘯西川黄婆無爲丁公嘿然身中夫婦雲雨交懽天乙生水在乎清源離己坎戊以土爲先土中有火妙在心傳如龍養珠波涵玉淵如鷄抱卵暖氣綿綿磁石吸鐵自然通連花蒂含實核中氣全禾花結穗露蘂團圓隂陽造化萬物無偏人與萬物初無媸妍守得其法天地齊年不守之守如一物存回風混合碧草芊芊其中變化萬聖千賢始由乎坎終至乎乾卯酉沐浴進退抽添有文有武可陶可甄聖胎既就一鏃三關却使河車運水登山三尸六賊膽碎心寒銀盂盛雪一色同觀鷗入蘆花月照崑崙玉壼涵冰即成大還烏飛兔走造物清閑金液鍊形玄關精根玉符保神絳宫丹元晝運靈旗騏驥加鞭夜孕火芝一朵金蓮一聲雷電人在頂門青霄萬里蟾光一輪移爐换鼎以子生孫得道尸解陸地神仙功圓行滿身登紫雲以神合道道合玄元凝虚鍊靜高超四禪跳出混沌法身無邊只此眞機何千萬篇一言簡易十月精虔但觀奎婁莫守幽燕夜月飯蛇秋露飲蟬晝夜二六十二周天但將此語凝神精研西林入室有一明珠光爍爍照破三千大千國觀音菩薩正定心釋迦如來大圓覺或如春色媚山河或似秋光爽巖壑亦名九轉大還丹謂之長生不死藥步步華嚴妙宫殿重重彌勒寳樓閣墻壁瓦礫相渾融水鳥樹林共寥廓缺唇石女駕土牛跛脚木人騎紙鶴三業三毒雲去來六根六塵月綽約所以然者本體空誰言何似當初莫此珠價大實難酬不許巧錐妄穿鑿若要祕宻大緫持只於寂滅中摸索幾多衲子聽蟄雷幾箇道人藏尺蠖茫茫盡向珠外求不知先天那一著那一著何須重注脚注脚也不惡好呵兄弟杜宇聲隨曉雨啼海棠夜聽東風落西林架造鐘樓普説青霞紫霧鎖寒松萬丈銀潢瀉碧峰寺在藤蘿最深處人居水石妙光中瓊樓畫棟翔金鳳寳殿瑶階砌玉龍誰識開山舊面目一丘煙雨暮衙蜂西林禪寺垂今五百餘年惠老開山到此四十三代前聖後聖彼時此時普菴長老冰霜面目風月心胷若孤嶼九臯之春鶴如寒江一影之秋鴻眞箇是末菴之孫吞盡栗棘蓬眞箇是草堂之子坐斷大魔宫比來西林寺一息十七冬千指聚會萬廢興崇紀綱整蕭有古人風規模洪遠立開山功爭奈百尺夜蜃千丈朝虹蟻枵蟲蠹而久欲頽弊雨凌風震而誰可帡幪縁此鐘萬斤鐵與銅緣此閣千章杉與松銅鐵可以磨歲月杉松尚有三尸蟲屋角插天空影月簷鈴落地不聲風既破不將茅草蓋要成只在刹那中了菴慈行如菴法瑩舉頭捉眀月開口吞虚空向這裏弄精彩展機鋒把一團通紅熱鐵爛嚼吞却直得須彌倒卓海水逆流觀音彈指龍女搥胷普菴不敢埋没令玉蟾爲他顯這神通説這禪葛藤説些道葛斗南泉猫兒跳趙州狗子走天皇沐馬嘶石霜角虎吼雪峯毒蛇唱山歌潙山水牯打筋斗喝閑言剩語不當夜飯必竟如何行瑩二大師逢人不得錯舉可將金銀琉璃𤦪璖瑪瑙眞珠等寳滿載而歸却來了這末後句末後句還會麽撥動如來向上關擎天大手有何難他時平地抬頭看聲撼半天風雨寒海瓊白眞人語録卷之三
