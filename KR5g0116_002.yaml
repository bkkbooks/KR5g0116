body:
  text: 門弟子福州天慶觀管轄兼都道正紫光林伯謙等編鶴林法語嘉定壬午上元祖師海瓊君以度師鶴林君致書自浙而閩為度師鶴林君之父先吏部覺非先生行黃籙事是日凌晨至止度師袖香而前稽顙長跪其辭曰耜居閩從先生之去晝夜行道莫敢荒嬉天何言奪相所怙頃奏記致省道候且及所怙已傾祈先生哀之實其傾背之時風霆飛鳴舉室芬異户外晴晝人無所聞似亦異乎他人之死及葬隂雨連日倏為之霽葬已雨依然邦人亦有知而異之者耜僣以黃籙致浼今先生來下此黃籙之事其遂也三界幸甚萬靈慶甚祖師曰吾子無庸過禮今日適上元亟命建靖治立玉堂置玉匱司仍置黃籙所自辰及申文書成告盟天地植臣幡于門命虛夷趙汝澮為高功紫樞林時中為都講紫光林伯謙為監齋芝房吳景安為侍經玉靈鄧道寧為侍香玉華陳彌隆為侍燈紫壺謝顯道為直壇紫瓊趙收夫為看斑豫攝行上清黃籙使為總監其以正月晦日補職二月一日行事四日成醮乃謝恩五日祀雷凡齋醮事用古式九朝科飮如常儀度師曰諾二月一日庚辰方旦大雨如注自一日雨而三日風雨隂晦其三晝夜之間凡九朝一才引班上謁即霽朝罷復雨九朝皆然二日辛巳之酉伏進章書人憂其雨方其伏章頓雨止四面雲合獨壇上北辰炯然而壇外雨如織踰時事畢壇上雨亦滂下觀者相慶祖師曰隂晴天家事也偶然耳何憂何喜三日壬午之久有自家廟內得所覩者知是先靈之至度師喜而入報祖師遽止之曰聽其自爾大道無形不尚影像也法者道之用耳能致幽明也今誰有所睹何怪焉或問曰醮罷迎真宣赦之後大晴如未醮之前獨九朝之首尾凡三晝夜何其隂雨之如此祖師曰古今建黃籙多隂晦蓋幽魂苦爽出自隂關此亦感召而然也七日丙戌召諸神吏併以祀雷禮畢以所刑之牲及酒脯於巽地同丹符瘞之約以三日雷鳴掘符以安鶴林靖是年以去冬不雨種麥方艱遇此黃籙土膏獲潤醮已為齋宫謝恩神吏言功度師致謝曰先生行醮事此邦人之所未見而耜之所得多矣而沾丐生靈者亦不少也規行矩步藥石人心見所未曾光前絶後但先生聞所神異靈竒之告皆止之何耶曰偶然耳何庸喜之吾亦不喜其有亦不憂其無但知行道奉法聽其自然所以爾者憑此誠以徹其感恃夫法以行其事曾何憂喜於其間使萌此念則奪吾正念耳或問黃籙之義何理也祖師曰九幽拔罪有金籙白簡之法金籙即黃籙以故上天亦立黃籙院黃者為衆色之宗籙者為萬真之符此言黃中理氣總御萬真出幽入明濟生度死籙者亦録之義録鬼神之籍耳黃者亦主之義主鬼神之事耳蓋幽冥之鬼神有所主宰而攝録之也度師問曰斗為帝車運乎中央臨制四方以察妖祥故經曰中斗大魁總監衆靈又本經曰北斗七星天中大神魯語亦曰譬如北辰而衆星拱之審如是則斗極是為無配之象以其總御星河故也或曰斗居天中乃云北斗何以言之殊不知斗柄所指自子而始至亥而終晝夜常輪始終皆北故曰北斗也謂如南斗乃二十八宿之中居北宿之首者非北斗比也近世惑於南斗之名繪其象者其色皆赤又序於北斗之上其謬甚矣或又曰斗宿在二十八宿之度居於北方何謂南斗殊不知璧在北而曰東璧井在南而曰東井可以意會之也此理如何祖師曰然則然矣按周天星圖及渾天儀與夫古今推步之書皆不言南斗在北斗之上亦無所謂南斗之名此特道教有所謂南斗六司恐是天中隱星亦不可得而稽考也據法書有南斗祕諱云魑𩲓以屬南極朱陵火部火鈴之司又有南斗內諱云吒那般曲大黑則是有所謂南斗也若欲泯之其如經籍何度師問曰五星六曜有流伏凌犯之躔悖逆薄蝕之異實災厄禍患之所關也凡禳災度厄者必關告焉關告可也必法象而立其燈焉按金籙要略云諸燈皆有式而獨不立此燈之式非遺之也蓋羅計紫孛在天而為隱曜彼固隱之此固顯之何謂也祖師曰譬如北斗燈式而右弼星亦為隱曜固不欲燈之但有八燈而已夫羅㬋乃火之餘氣也計都乃土之餘氣也月孛乃金水之餘氣也紫氣乃木之餘氣也今但存十一曜之燈持於四星不必燈之可矣度師曰漢天師未上升時謂人曰苟有斗二升米來者吾皆為之譬如孔夫子自行束修以上吾未嘗無誨焉也故當時號為斗米先生今人多據度人經云至士齎金寶盟心效天而傳乃厚受賂而猶且欲傋鎮壇之儀何也蓋一切難捨無過己財故曰以食為天以財為命所以令其齎金寶露繒帛者特欲其割所難捨乃見真誠苟若於中一萌貪念是又失其本旨矣又曰一壇之醮重於上詞若主行之人有通真達靈之道則奏無不達矣故迎真之始即宣詞送真之後即焚詞項年於迎真宣詞之後却迎詞出中庭以焚之且如既迎真于北又宣詞于此反迎詞出而焚之何也以此可見主行之人無所謂存思必矣祖師曰靈寶玉鑑云遷神寶幡其色用緋兩邊題三清神諱而幡身題遷神寶幡四字今則幡色雖同尺寸有異書篆亦異昏以遷神寶幡名之非也又如古法置二幡於五苦九獄燈輪之內至攝召又置於香樂之前是二幡皆為有用也今者不然竪之門首徒為美觀懵不知其用矣如太微回黃旗合有旗式無英命靈幡自有幡式今皆不知其所以然或幡或旗殆不可辨又曰按黃籙律節文應召到亡魂當作善念以超度不得悽泣以傷神法官預行戒之戒之不嚴論如律此正度亡之意也夫貪生惡死人情之常苟未能齊死生孰能忘其死乎惟其一念尚存所以不能解脫故太上度生之意先破其惡死之念今則不然非惟不能禁其悽泣之情而且巧為昔容導之使泣以此相感迷惑益甚又曰神霄五雷大法載云上三元三天君白簡此一也中元金書九天寶誥此一也下元登真度命出離生死符此一也簡符誥籙雖有異名皆太上濟度群生之用也今以告命之告為告身之告以白簡與登真符皆列其中給付亡者彼之得此果何用耶又曰救苦長生二符功用甚大既曰元如符命是豈可輕所以路真官有奏乞之請及其符成則又密行三官及三十六獄今則不然其書也不曾奏乞其成也不曾密行又皆付之他人之手而高功皆不預焉世之相傳謂此二符頗有度亡之功每度一名須給一簡或十或百或千或萬皆計其數不敢有闕竊嘗謂白簡是木赤文是硃若白木赤硃可以度亡則九泉之下無不度者嗚呼神而眀之存乎其人苟非其人道不虛行使果皆通真達靈之士誠有濟生度死之心則雖一符一簡可以度萬魂有餘矣又曰按古章儀與續章儀所載諸章格式是欲後人有所依據也今則不然一章全篇皆摸寫古本不敢改易一字若是則古人伏章皆能記其章中之語亦豈難事哉伏章拜章存章上章皆一意也苟不能如此但云焚章可矣却委將軍符吏功曹使者而齎送之夫設醮上章各分其職欲其專也是以心無雜念身無雜務抱元守一如路真官所謂去醮七日非醮中事不得干預者方可行之今則不然有朝赴出喪而夕行上章者有代師上章而不改姓名者不擇日分不辨方隅不分早暮不知禁忌者此速咎於天者之所為也可不謹歟林伯謙問曰敢問科教何如祖師曰古之聖人以道學難入世欲易迷設科戒儀範之文以一齊其外著注念凝神之法以正其心復以鍊氣胎元之方制其食味又以祈真朝謝之品滌其過尤然後趍於學無學之徒臻乎冥叔栖於損又損之府契乎無為則邪譎之關鍵不開鎮靜之淳和可致故經有三籙七品夫三籙者一者金籙齋上消天災保鎮國王惟帝王用之二者玉籙齋救度人民請福謝過惟妃后臣寮用之三者黃籙齋濟生度死下拔地獄九幽之苦士庶通用之七品者一者三皇齋求仙保國二者自然齋修真學道三者上清齋升虛入妙四者指教齋禳災救疾五者塗炭齋悔過請命六者明真齋拔九幽之魂七者三元齋謝三官之罪此等諸齋或一日一夜或三日三夜或七日七夜具如儀範要之皆有所本也是故出乾入巽而出入皆有呪存神念真而存念皆有法或鳴法鼓或思圓像或出侍衛宣通之官必明其所出之方或請太上正真生氣必顯其所入之處然道在人心而尤須表奏者既未能冥會則因事而後顯蓋人心無質運之有境境淨則心眀心眀則行潔行潔則可以交神靈心眀則可以會天道故登壇告盟黃章表奏使心形俱盡人會神合也聞之曰丹書萬卷不如守一豫亦謂科書萬端不如守一苟知守一則可因其末而究其本因其粗而入其精不然徒飾其外而喧譁綺麗有同兒戲去道益遠矣何以通真達靈哉林伯謙問曰供奉之儀如何祖師曰古者交神之道誠敬為先後之誠敬不足乃備物以為儀苟使將誠果能備物猶可言也物且未備瀆莫甚焉經曰可以酌水獻花何必他求哉經又曰像世威儀則今之一切供獻之品惟無愧足矣不然皆未免於瀆可不戒哉度師曰按玉格天條凡設醮不得獻上真紙錢大為褻瀆古者雖有冥器未有紙錢迄于漢末方有紙錢以之祭中下界鬼神可也以之獻天真可乎夫世之貪利之徒雖身經太隂而一念尚存如萬光懺謂所闕所乏皆世財寶故紙錢之化欲破其念耳又曰科教中有關燈一節謂斗運乎中天實司人間禍福死生之權故急須投告無不應者苟力能辦醮當依密醮式或河圖醮式隨心禱祝今有為神祠慶生日而關燈者因疾病而許下關燈者實未知關燈之妙處祖師曰今世相傳皆知洞案之名而竟未知所以名者果何説也按古制其案以朱為飾盛三洞寶經於其上故謂之洞案凡有關奏皆在洞案之前今則不然徒具一案不飾以朱此猶可也貴獻文字皆在其上此猶可也甚者雜置諸物於其上或出此以祝香或出此以宣詞取其近於帝尊之前也且天高聽卑無遠不聞若曰取其近於帝尊之前其諸關奏果不聞乎夫豈知遍滿虛空神明森然一念苟萌三界周知何分遠近高下哉又曰醮科之首冠以勑水是欲蕩穢也後世執而不變至於三朝九朝之後入醮之初方行蕩穢若是則當九朝三朝之時穢尚未蕩可以朝真乎若謂像設既陳自無氛穢入醮之初何用勑水哉以豫觀之凡行事之初便當勑水境淨則心明心明則行潔行潔則可以交神靈心明則可以合天道既勑水之後由是而祝香請師朝真皆以次舉矣紫壺謝顯道問曰罡步大旨如何度師曰子聞之師曰大率罡步多以五步推五行生尅步之如貓犬之伏蛇進五步退亦五步進七退亦七四方按五行生成之數及至蛇伏然後害之伹看伏鼠亦然故云巫步多禹禹步惟五能合五行久久升舉如八門遁甲太乙六壬孤虛之法大要在罡步也又如今之人履魁躡斗夫豈知有大禁忌者存且如經云子欲登真莫觸真人真人第三星也又曰子欲召靈莫塞天門天門文曲星是也凡步斗之法切忌干綱犯紀如腳步橫截而過是謂之干綱如腳步誤踏而進是謂之犯紀如干犯之時隨即就其星首謝可矣紫璚趙牧夫問曰今之所謂隂斗陽斗者度師曰昔得之於師云冬至後自魁始為陽斗夏至後自魒始為隂斗先步陽斗後步隂斗謂之火水未濟先步隂斗後步陽斗謂之水火既濟今人以左腳起初星念魁至魒為陽斗以右腳起初星念貪至破為隂斗謬哉是無據之論也飛神謁斗經云順則陽逆則隂從魁至魒則為順自魒至魁則為逆大要只云子欲飛神莫忤真人第三星也外此皆丁步也伯謙問曰臘有五臘何謂也祖師曰正月一日為天臘此日五帝會九氣於東方青天是天蓬都元神開元應太皇府之日也五月五日為地臘此日五帝會三氣於南方丹天是欻火律令大神入神霄玉清府之日也七月七日為道德臘此日五帝會七氣於西方素天是天猷副元帥開元照靈虛府之日也十月一日為民歲臘五帝會五氣於北方玄天是翊聖大元帥開元景丹天府也十二月遇臘日為王侯臘此日五帝會萬氣於上方玄都玉京是玄武大元帥開元和遷校府之日也以上五日乃五帝攢會之日五神開府之初是為五臘矣祖師曰子習聞之舊矣漢陸賈為玉清元始法師總仙上真領黃籙院事又辛漢臣今為雷霆都司狼牙猛吏晉陶弘景今為蓬萊都水司監唐褚遂良今為五雷使者顔真卿今為北極驅邪院左判官李陽冰今為北極驅邪院右判官李白今為東華上清監清逸真人白樂天今為蓬萊長仙主又如晉女仙魏華存今為紫虛元君領秩仙公唐女仙謝自然今為東極真人彼何人斯可不勉之又曰按神霄玉格曰籙稱元命真人謂行正一之道令自修其元命以得其真豈有凡俗以真人為職銜公然妄用至於奏聞當須克己自思所修有無真人之行儻無真人之行輒書真人之職罪及九祖天赦不該只許稱授甚法籙下稱法銜不稱籙銜者同俗人授即稱弟子顯道問曰近聞圓通一法嘗竊疑之彼之法印內圓外方中有五行外有八卦省府司院列於四方以靈寶圓通四字為宗以混化玄祕四字為本其間輟拾諸法符圖呪訣創為一家謂之圓通大法真師然之否乎曰神無方故曰圓氣無體故曰通古者圓通之説即是神氣混合出入虛無還返混沌今若以形器卦數為之其與真箇圓通不亦遠乎祖師曰漢天師有云人能六根清淨方寸澄徹久而行之可以坐役鬼神呼召雷雨今之學法之士不本乎道不祖乎心人自為師家自為學以開光附體為竒以影迹夢想為妙其所召之將吏則千百姓名其所補之法職則真人使相或以師巫之訣而雜正法或以鬼仙降筆而謂祕傳問之則答為依科别之則執為真㖟嘻邪師過謬非衆生咎一盲引衆迷以傳迷哀哉度師因與紫樞談及符水一事以謂求者未必皆敬信之人或有試求之者豫亦試以與之往往亦不驗祖師聞之曰不可彼以假來我以真受至於驗與不驗却是他事祖師又曰不問靈不靈不問驗不驗信手行將去莫起一切念度師謂伯謙曰爾祖師所治碧芝靖豫今所治鶴林靖爾今所治紫光靖大凡奉法之士其所以立香火之地不可不奏請靖額也如漢天師二十四治是矣古三十六靖廬是矣許旌陽七靖是矣靖治律曰民家曰靖師家曰治祖師曰夫建壇設醮其實一也議者曰天無浮醫四氣朗清河海靜默山嶽吞煙日月不行璇璣停輪上下開通二儀交泰當此之時百靈衆真冥相交會是故醮告之際必欲如此可也但上章拜詞迎真降聖遇此天色似亦感通若曰拔亡度魂必須隂雨而後可若曰禳災度厄必須晴明而後可故凡醮祭準此度師謂顯道曰豫嘗聞之師曰老聃有三寶一曰慈二曰儉三曰不敢為天下先許旌陽有八寶曰忠孝廉謹寬裕容忍吕洞賔有四寶曰無妄一也不貪二也至誠三也守一四也陳泥丸有五寶一曰智二曰信三曰仁四曰勇五曰嚴臨事多變使人莫測謂之智專心致志守一如常謂之信濟人利物每事寬恕謂之仁處事果決秉心剛烈謂之勇謹勿笑語重厚自持謂之嚴東方蠻雷仁者也能為風雨長養萬物南方蠻雷勇者也申明號令賞善罰惡西方蠻雷嚴者也肅殺元氣霹靂群動北方蠻雷智者也伏藏坎位遇時而起中央蠻雷信者也四時蜚伏令不妄發此乃心傳之妙真中有神誠外無法祖師曰方咫之木致於地上使人蹈之而有餘方尺之木致於竿之端使人踞之而不定非物有大小也蓋心有虛實耳猛虎行草木偃毒鴆怒土石揭蓋神全則威大精全則氣雄也射似虎者見虎而不見石斬暴蛟者而不見水當是時目視者有所不見耳聽者有所不聞此蓋以神用形之道也心不疑乎手手不疑乎筆忘手筆然後知書之道夫蕩穢者必召五帝之氣伏虺者必役五星之精苟召役不至則何以為之神猶母也氣猶子也以神召氣以母召子熟敢不至度師曰昔有高僧詩云一池荷葉衣無盡數樹松黃食有餘剛被世人知住處山僧今日又遷居續有修仙之士亦賦一絶云飢餐舌下津還飽寒發丹田火便溫自有隨身窮活計不如求我莫求人似此二詩亦可以少汰身口之濁謀耳祖師曰修真之士誠心以立其志苦節以行其事精思以徹其感忘我以契其真苟能如此經云宇宙在乎手萬化在乎身又曰人能常清靜天地悉皆歸世人未必知此能於喧中得靜濁中得清作平等觀了一切念動無質礙得大安藥是謂之道如其不然瞻星禮斗亦可也念經誦呪亦可吾不知矣又曰吾聞之先師曰古仙上聖口口相傳不立文字吾今於世書而録之得悟之者可傳聖道無悟無得悟者自得得悟聖道無古無今其去非古其來非今所可傳者只謂之事不謂之道道本無傳道無聲色道無相貌道無古今道無往來又曰行法如做官修道如隱遁又曰客至有問及十二功曹者遂為訓釋云天罡屬辰辰戌丑未謂之四正以其屬土居於中央故曰四正罡字從四從正以辰為土故此功曹謂之天罡太乙屬巳巳為雷門又曰風門水口又為九天太乙十神之位故此功曹謂之太一勝光屬午午為離明本非勝光乃騰光也小吉屬未大吉屬丑皆天之貴神甲戊庚乃天之三竒以牛羊為貴故大吉小吉皆為吉神也傳送屬申申為坤坤為地户地户為雲會雲上於天故曰傳送從魁屬酉從字去聲從者隨也從也以其在戌魁之傍故曰從魁也河魁屬戌戌亥為河源戌為天河故此魁神名曰河魁登明屬亥亥為天門也神后屬子子屬坎坎為隂后天后故曰神后寅為功曹寅艮也坤艮皆土艮為山坤為地山澤通氣是故艮坤為雲會所以寅申為功曹傳送之神也大衝屬卯卯為雷也雷神謂之天衝也度人經所謂擲火萬里電也流鈴八衝雷也此雖十二功曹實天帝肘臂之助海瓊白真人語録卷之二
