body:
  text: 紫壺道士謝顯道編眞師海瓊白君與鶴林彭㭒紫元留元長於中秋之夕星垂月落煙起露下千家閉户一路無人相與㩦手過榴花洞須臾天曉盤礴忘歸坐於磐陁之上命二子共席左右焉顧謂之曰天上人間今夕何夕神霄路邈紫府人稀二子學仙久矣顧無疑可以問乎眞師曰老子云有物混成先天地生多少是説得好也後人謂之道謂之心謂之性謂神者謂炁者謂一念者謂法謂教謂術謂情者嗚呼枝分派别豈知乎有物混成者存哉眞師曰大造無聲風自鳴籟自動冬去冰須泮春來草自生燕夏至鴻秋歸霜天梅花開月夜螢火明此自然而然爾參到此處口欲言而辭喪心欲緣而慮忘眞師曰大造無爲元功不宰或問何如曰巢知風穴知雨噫人哉眞師曰世間所有一切法法中所有一切門此皆合藥之方治病之藥也須知湯使其藥始驗或問湯使何如曰心乃法之湯使也眞師曰一日雷部將吏報言但有一處安香爐即是神霄玉清府元長問曰經中有謂神女三千六百常在我傍呪中有云勑吾身中三萬六千神夫經呪皆太上語也謂之有耶無耶眞耶妄耶答曰夫人身中有内三寳曰精氣神是也神是主精氣是客吾是主金童玉女是客所言神女三千六百及乎三萬六千神者此皆精氣所化今人心猿意馬一日千里又況精衰於淫氣竭於嗔更且眼隨色轉耳被聲瞞所益於己者幾何而所喪者不可勝言也曾不知神光外散氣力四馳既精氣不存而欲金童玉女在左右可乎萬神一神也萬氣一氣也以一而生萬攝萬而歸一皆在我之神也眞師曰人之一念聚則成神散則成氣神聚則謂之魂氣聚則謂之魄生曰人死曰鬼陽曰魂隂曰魄眞師曰北斗經非太上所作蓋漢時張正一所紀太上之㫖以爲之今人不知經㫖徒然瞻星禮斗夫人之身所有一氣東升西沉上升下降亦如天地天地之氣曰隂與陽人所禀亦如之若夫天之北斗晝夜常輪以分隂陽以定時刻故天地以之常存胡不思人身一氣統之者誰能知所統之者則知身中之北斗也斗經云家有北斗經六畜保興生此蓋身中北斗宰制其氣則眼不欲視耳不欲聞鼻不欲香舌不欲味身不欲觸意不欲思畜此精華自然至於宅舍安寧子孫榮盛也眞師曰北極驅邪院本只有崔盧鄧竇四將今却增四名梅仙考召院本只有潘耿盧查四將令亦增四名此皆後人所增即非本法所有眞師曰古法官有用黄劉二將者又有高丁二將者復有用焦曾二將者用桑何二將許謝二將者在其所受於師者用無不靈驗眞師曰天心紫文云三元洞虚五行洞華八卦洞晨十方洞眞今人行八卦洞晨法却使動神字是不知其所始迷以傳迷有如此者眞師曰古無酆都法唐末有大圓吴先生始傳此法於世以考召鬼神其法中只有八將三符四呪及有酆都總録院印後人增益不勝繁絮似此之類安有正法眞師曰法中明言北極驅邪院盍云天機院是故南極有天樞院如天上左有天樞省右有天機省緣天機是北極之内院驅邪則外院也彼天樞亦是南極之内院而南極又有進奏院在外也㭒問曰人之一念自可感動天地今凡發章奏差將吏既以焚化自可上達又何謂六天妖魔得以遏截者耶答曰一念之誠與道合眞故可感召眞靈無疑矣古者有孝心有誠心有義心有慈心有剛心有忠心皆於肹蠁之間感天動地蓋其一心之專一念之正所以然也今人焚章疏達帝宸此則科教使之爾緣心念之感如以箭射物也彼章疏之感如持鎗刺物也箭雖遠而急至鎗雖近而難及故章疏是有形之物妖魔得以遏截如心念出於無形則妖魔如何遏截也元長問曰夫人念念紛起起滅不停因何此念不能感召答曰子不見猫之捕鼠乎雙目瞪視而不瞬四足踞地而不動心無異縁意不妄想六根順向首尾一直所以舉無不中者也眞師曰混沌既分三才始立人居天地之中其形雖小其神實大其形雖卑其神實高玉蟾向時詣闕奏事其章䟽上寫字如粟及至天都其字如盞始者在人間時章疏之紙亦甚短小及至天中章䟽高丈餘闊二丈以此觀之大梵隱語所謂雲炁結成一丈之餘天眞皇人按筆乃書此之意也昔者觀清源志見天書于龍潭之上有曰詔黑赤示之鯉魚昌黎辨之曰此上帝斬龍之文也其字不過一寸想其在天亦不止一寸也以今觀之此無他天大所變者大人小所現者小譬如人之照鏡鏡大面亦大鏡小面亦小自今而後凡有章䟽紙須高一尺不可過高字須大如粟不可過大此語不誣也元長問曰嘗疑鍊度是兩件事不知是否答曰度人經云生身受度一也又云死魂受鍊二也今觀朱陵景仙度命籙文有曰南昌宫所攝二宫一曰上宫一曰下宫上宫主受鍊司事下宫主受度司事生身在下土故以下宫主之死魂升上天故以上宫主之總而名之曰朱陵火府亦曰南昌鍊度司今人所稱南昌上宫受鍊司眞官典者所用受鍊司印却併主生身受度符籙事委是無據既言南昌受鍊司而又稱上宫受鍊司此又無據今不須言上宫下宫亦不須説受鍊受度但云南昌鍊度司却用本司印方有所本爾其印文曰南昌鍊度司印只用人間曡篆方圓一寸三分元長問罡步如何答曰罡步多禹禹步惟五能合五行久久升舉大率罡步多以五步推五行生剋步之如猫犬之伏蛇進五步退亦五步進七退亦七四方按五行生成之數及至蛇伏然後害之但看伏鼠亦然且猫犬之伏蛇進退之間或爲人所衝擊或爲人所叱唤纔轉身即蛇得而害之蓋罡步不成也如八門遁甲隱身循形之法大要在罡步神哉㭒問世所傳隂陽斗亦有疑焉答曰今人以左脚起初星念魁至魒爲陽斗以右脚起初星念貪至破爲隂斗謬哉是無據之論也飛神謁斗經云順則爲陽逆則爲隂從魁至魒則爲順自魒而魁則爲逆大要只云子欲飛神莫忤眞人眞人第三星也外此皆丁步丁步則爲踏單步則爲點如曰不然吾不知矣㭒問召將或用叱咄可乎答曰前輩有云敬之如君父驅之如僕使蓋呼召將吏之説則是以神感神也人若無威則神不全凡呼召時須是秉太上之勑命則左右呵斥儼然若存庶幾可以我之神而役彼之神也眞師吿㭒云今但專佩一籙專受一職專行一法專判一司文字於一司將吏前專用一符一水不過只是心與神會用之則靈耳恰如眞龍但一滴水便作滂沛豈用如許繁耶元長問曰近世有行靈寳法者不曰無此法也復有行圓通法者亦不曰無此法也更有行混元法者亦不曰無此法也然其門類之多呪訣之繁而於道則不甚正一也古者以正一傳教故所行之法簡而且易今曰靈寳何異圓通今曰圓通何異混元今曰混元何異正一夫人之心本自圓通本自靈寳本自正一本自混元以人之一心而流出無窮無盡之法蓋如天之一炁生育萬物也而又曰混元是一階靈寳是一階圓通是一階正一是一階譬如杜鵑鳥或曰子規或曰謝豹或曰白帝魂或曰映山紅或曰搗藥禽或曰蜀鳥其實一杜鵑也眞師曰法法從心生心外無别法元長問曰近觀靈寳法之旁門又有曰圓通一法復有太上淨明院法一階或有用太上淨明院印者或有用圓通印者其印文有靈寳圓通混化玄祕八字列於八方其印之中又有司院省府四字其印内文却圓外文却方蓋取圓通之意以愚意觀之靈寳圓通混化玄祕此心印也故欲以此木印而盡此八字可乎所謂司院省府此靈臺也故欲以此木印而爲此司院省府可乎殊不知靈寳本是圓通圓通本是淨明又何必尋枝摘葉如許之繁哉答曰誠是圓通法所造一顆印説要圓通却不圓通元長問曰巫法有之乎其正邪莫之辯也答曰巫者之法始於娑坦王傳之盤古王再傳於阿修羅王復傳於維陀始王長沙王頭陀王閭山山在閭州九郎蒙山七郎横山十郎趙侯三郎張趙二郎此後不知其幾昔者巫人之法有曰盤古法者又有曰靈山法者復有閭山法者其實一巫法也巫法亦多竊太上之語故彼法中多用太上呪語最可笑者昔人於巫法之符下草書太上在天今之巫師不知字義却謂大王在玄呵呵元長問曰法中念呪何如答曰呪者祝之義也夫祝之之意欲以達乎天地神明果爾則世間善惡之祝在在報應耳今又不然何哉是未知所以呪之之意也夫井蛙之聒太清穴蟻之噪上靈則猶今人之祝也是豈可以祝取報應哉如法中呪語一則太上金口所宣二則徃徃皆將吏旗號所以呪之要在乎法法所以呪將吏亦從之高眞亦聞之如今人念呪之不效者何哉蓋不審此呪意也呪之意義貴乎心存目想則號召將吏如神明在前之説元長問曰救苦經云天上三十六地下三十六太玄無邊際妙哉大洞經或以爲隂陽二炁七十二候是否答曰此乃人身中事也泥丸象天屬乾乾數四乾金甲子金數四乾用九尾閭象地屬坤坤數六坤用六故四九三十六則謂之天上六六三十六則謂之地下此言人之頭上有三十六脉腹下有三十六絡天地亦如之惟人之心視之不見聽之不聞故曰太玄無邊妙哉大洞也㭒問曰有五戒其一曰不飲酒然酒亦不害於道愚恐昏迷其性故也酒果可戒乎答曰藏經太上云高才英秀惟酒是耽麴糵薰心性情顛倒破壞十善興起十惡四達既荒六通亦塞眞師告㭒云女仙萼緑華謂羊權曰修道之士視錦綉如弊垢視爵位如過客視金玉如瓦礫無思無慮無事無爲行人所不能行學人所不能學勤人所不能勤得人所不能得何者世人行嗜慾我行介獨世人學俗務我學恬漠世人勤聲利我勤内行世人得老死我得長生眞師曰古人有言智過於師方堪傳授智與師齊減師半德而況書云師勞而功半師逸而功倍者此也眞師曰天下物惟有水銀與腦子假不得教中以精比水銀謂之汞以頭髓謂之腦蓋水銀易飛腦子易走且如水銀腦子雖封鎖在宻處但有所以引之飛走則失其所在如椒之透水銀是也今人精髓多爲淫所攝遂至枯竭哀哉眞師曰先師陳泥九昔在徽廟時嘗遇大洞眞人孫君與之曰昔者元始天尊與太上老君所説經採摭編録自成一藏且如北斗經南斗經消災經常清靜經天童經靈寳度人等經玉皇天尊號從上諸事皆有實跡㭒問曰今之瑜珈之爲教者何如答曰彼之教中謂釋迦之遺教也釋迦化爲穢跡金剛以降螺髻梵王是故流傳此教降伏諸魔制諸外道不過只三十三字金輪穢跡呪也然其教中有龍樹醫王以佐之焉外此則有香山雪山二大聖猪頭象鼻二大聖雄威華光二大聖與夫那义太子頂輪聖王及深沙神揭諦神以相其法故有諸金剛力士以爲之佐使所謂將吏惟有虎伽羅馬伽羅牛頭羅金頭羅四將而已其他則無也今之邪師雜諸道法之辭而又步罡捻訣高聲大叫胡跳漢舞摇鈴撼鐸鞭麻蛇打桃棒而於古教甚失其眞似非釋迦之所爲矣然瑜珈亦是佛家伏魔之一法㭒問曰郷間多有喫菜持齋以事明教謂之滅魔彼之徒且曰太上老君之遺教然耶否耶答曰昔蘇鄰國有一居士號曰慕闍始者學仙不成終乎學佛不就隱於大那伽山始遇西天外道有曰毗婆伽眀使者教以一法使之修持遂留此一教其實非理彼之教有一禁戒且云盡大地山河草木水火皆是毗盧遮那法身所以不敢踐履不敢舉動然雖如是却是在毗盧遮那佛身外面立地且如持八齋禮五方不過教戒使之然爾其教中一曰天王二曰眀使三曰靈相土地以主其教大要在乎清淨光眀大力智慧八字而已然此八字無出乎心今人著相修行而欲盡此八字可乎况曰眀教而且自昧眞師云或凡或聖如影隨形一爲無量無量爲一譬彼日月現於衆水日月之光本無彼此隨水而生逐眼而現一水千眼千日千月一水一眼一日一月千水一眼一日一月千水千眼千日千月如影隨形亦復如是取亦不得捨亦不得不取不捨亦不可得㭒問曰世之所言隂丹陽丹此外丹耶内丹耶答曰外丹難鍊而無成内丹易鍊而有成所爲隂丹陽丹者即内丹也丹者心也心者神也陽神謂之陽丹隂神謂之隂丹其實皆内丹也脫胎换骨身外有身聚則成形散則成炁此陽神也一念清靈魂識未散如夢如影其類乎鬼此隂神也今之修丹者可不知此眞師告元長曰赤靈玉文云東極寳華西極太清北極驅邪南極天樞此乃四極而中極五雷實掌四極之司今都天大雷盡出神霄玉樞之上謂之景霄大雷景霄雖在神霄之下乃元始駐蹕之司向者天眞遣狼牙猛吏雷部判官辛漢臣授之先師陳翠虚翠虚以授於我今以付子子宜祕之眞師曰神歸浩渺須彌小炁入虚無芥子寬眞師告㭒曰爾謂十一曜呪誠是太上所説明矣乎曰誠哉曰嘻彼呪中有謂甘石推流伏然甘德石申皆星翁也却是春秋戰國時人甘石未生此經先有質之於此豈太上語哉嘻眞師告元長曰爾謂世間混元如意之法誠然乎曰然曰嘻彼法中有呪云北極佑聖眞君律令又曰三天扶教輔元大法師律令果爾則可疑也佑聖乃周時人天師乃漢時人若是混元法已在太上之先亦不應用太上老君律令也況佑聖與天師乎何哉謂混元也嘻㭒問曰近聞圓通一法嘗竊疑之彼之法印内圓外方中有五行外有八卦省府司院列於四方以靈寳圓通四字爲宗以混化玄祕四字爲本其間掇拾諸法符圖呪訣創爲一家謂之圓通大法先生然之否乎曰神無方故曰圓炁無體故曰通古者圓通之説即是神炁混合出入虚無還返混沌今若以形器卦數爲之其與眞箇圓通不亦遠乎況古無此法嗚呼邪師過謬非衆生咎眞師告㭒云汝知斗中擎羊陀羅二使者否曰願聞其説曰擎羊乃人間之字在天上則是掌善之音陀羅乃人間之辭在天上則是都大之字擎羊使者手執玉瓶金色蓮花陀羅使者手持金盤白獬首香爐若世俗之見誤矣眞師曰先師嘗言人間有甚快樂也然苦樂常相循環樂無百年若有萬劫今之世者有錢底守死無錢底討死未見天下人與錢爭命不與命爭錢噫眞師告元長曰爾知吾所説法皆心法否曰知之曰如何是心曰不知曰爾既不知何以行持曰凡所有法無非心法曰爾且行持久而知之知則不知不知則知爾雖不知何異於知㭒與元長聞斯語已踴躍悲慨大有警悟海瓊君笑而起傳度謝恩表文高上神霄玉清府雷霆令統五雷將兵提領雷霆都司鬼神公事臣玉蟾言以今月十五日伏爲上清太華丹景吏神霄玉府西臺令行仙都風雷判官臣彭㭒上清大洞玄都三景法師太乙雷霆典者九靈飛步仙官簽書諸司法院鬼神公事臣留元長太上正一盟威法師充驅邪院判官南昌典者九靈飛步仙官兼管雷霆都司鬼神公事臣林伯謙太上三五都功職籙神霄玉府右侍經臣潘常吉太上三五都功職籙神霄玉府右侍經臣周希清太上三五都功法籙弟子奉行天心正法驅邪院判官兼幹五雷使院事臣胡士簡太上正一盟威法師行上清混元天心五雷大法差充主管驅邪院事兼雷霆都司事臣羅致大太上三五都功紫虚陽光祕籙弟子行上清北極天心正法金闕内臺鍊度典者驅邪院右判官臣陳守默太上正一盟威法師行靈寳天心玉晨五雷大法九靈飛步仙官主管驅邪黄籙院事臣莊致柔等臣付以道法奏准玉格注授前件差遣即日具表恭詣闕庭稱謝天恩者伏以法有正傳幸相承於師訓職無虚授期仰答於天恩敢因拜貺之私輒控由中之悃臣等蟪蛄如幻螻蟻何知忝編中國之泯實出大鈞之造仰乾坤之覆載荷日月之照臨坐食懷慚奚功及物深惟曠劫以迨今生粤有此身而迄兹際三惡不善殺盜邪淫六根無眀貪嗔癡愛罪洪如海業重於山賴上眞開懺謝之門使至蠢有披陳之路既與原已徃之咎復爲弭未萌之災更昧皈依實負陶鑄夙縁契道遇神霄五雷之書凡質希仙受太上九靈之㫖故得掌心握印筆下飛符役使風霆區别人鬼濟生度死輔正除邪豈墮身於塵坌之間敢飛步於魁罡之上古來傳授今故奉行内鍊刀圭外儲功行體天行化佐國救民恭惟高上神霄玉清眞王長生大帝陛下道大難名德博而溥群生父母王界月師端九旒於萬炁之先御八極於太空之表慈悲濟世方便度人臣剡牘東臺厠員西府講分符破券之典效歃血飲丹之儀誓領將吏以立殊勳全賴符圖而闡大教淵衷俯鑒眞隂潜孚願清海嶽之埃而鎖妖魔之洞庶闢虚無之閫再揚正一之風干冒天威遵禀帝命如蒙覆護俾遂設施體未洞眞胎炁更資於玉炁神其入妙心天允合於璇天臣等謹具表奏以聞誠惶誠恐頓首稽首再拜謹言太歲戊寅嘉定十一年十月日具位臣玉蟾表奏神霄吟三絶渺渺神霄天玉京何岧嶢瓊花露濕蘂琪樹風鳴條瑶妃侍雲笈羽童舞金翹嗟彼世間人紅塵徒朝朝紫瓊飛清都翠雲護絳闕不見有星辰俯視但日月下世二千年不敢向人説吾已成金丹留下飛仙訣玉皇香案吏金闕禁垣卿寳爐烹日月鐵尺鞭雷霆曉鍊西山雲夜前北斗星城南告樹精吾家在瑶京吾師海瓊君飛錫於康廬之間嘉定戊寅春有書相期於武夷子以宗幕銜檄中都夏徃秋回價舟尋盟杳不可覓遂留三絶以紀曾經云細君周希清聯鑣來游是年重九紫元子留元長子善書止止菴前九曲溪我來倚櫂對斜暉逢人還問師歸未但見龍蛇壁上飛眞師默跡飛動壁間飛步來尋换骨巖空餘遺蜕窆垠函紫元豈是無仙分底事憑誰爲指南今朝恰恰是重陽洞裏風飄桂子香却與細君同採菊歸來滿泛九霞觴飛仙吟贈留紫元夜騎玉鰲採明月蘂殿瑶臺寒徹骨三十六天不閉門風吹琪花散飛屑蕭鳴處隊仗多八萬霓裳歌白雪紫皇宴罷駕方出整衣端簡去朝謁火鈴將軍呵一聲左右萬眞聳毛髮奏云臣是雷霆吏舊因罪去辭丹闕紅塵埋身平至耳餐青飲緑守苦節飛神登天來正渴是帝有酒覓一啜使臣一醉放臣歸歸去人間向人説鳳凰閣下問歸途瓊童玉女却問子天上日長太清虚人間還似此間無摇頭不答徑拂袖白雲眇眇迷清都洞中猿鶴更相認白石爛兮青松枯華陽吟三十首家在瓊崖萬里遥此身來徃似孤舟夜來夢趁西風去目斷家山空淚流海南一片水雲天望眼生花已十年忽一二時回首處西風夕照咽悲蟬一從脚别海南船身逐雲飛江浙天走遍洞天尋隱者不知費幾草鞋錢白雲和我到天台眼入青山意豁開到彼山中還又起空令到處夜猿哀拄杖尋身入武夷慢亭峯下雪花飛行從九曲灘頭看萬壑千巖翠打圍武夷結草二年餘花笑鶯啼春一壺流水下山人出洞巖前空有鍊丹爐得訣歸來試鍊看龍爭虎戰片時間九華天上人知得一夜風雷撼萬山白馬江頭嘯一聲紅光紫霧水中生急抽匣内青蛇劒纔得黄河徹底清渴飲金波數百鍾醉時仗劒指虚空脚根戲躡交乾斗長嘯一聲天地紅移將北斗過南辰兩手雙擎日月輪飛趁崑崙山上出須臾化作一天雲戲泛金船到海涯暗隨海水度流沙一從登着蓬萊岸去看瓊臺閬苑花人身自有一蓬萊十二層樓白玉階姹女金翁常讌會堂前夜夜牡丹開怪事教人笑幾回男兒今也會懷胎自家精血自交媾身裏夫妻是妙哉一吟一醉一刀圭眞氣眞精滿四肢若到酒酣眠熟後滿船載寳過曹溪元神夜夜宿丹田雲滿黄庭月滿天兩箇鴛鴦浮緑水水心一朵紫金蓮飢餐一兩黑龜肝寒向丹田猛火山但見心頭無點事不知人世有飢寒青牛人去幾多年此道分明在目前欲識目前眞的處一堂風冷月嬋娟片餉工夫鍊汞鈆一爐猛火夜燒天忽然神水落金井打合靈砂月樣圓一泓神水滿華池夜夜池邊白雪飛雪裏有人擒玉兔趕教明月上寒枝不動絲毫過玉關關頭自有玉京山能於山内通來徃風攪九天霜雪寒誰識週天造化功于今蹙在片時中只將鈆汞入眞土鍊出金花滿鼎紅昨夜三更雷撼山九天門户不曾關曹溪路上分明見有箇金烏入廣寒曹溪一路透泥丸只在丹田上下間解使金翁媒姹女朝雲暮雨滿巫山秪將戊己作丹爐鍊得紅丸化玉酥慢守火爻三百日産成一顆夜明珠絳闕仙都一散郎偶來人世且佯狂身中自有長生寳夜夜飛神謁上蒼家在神霄九炁天天中樓殿貯群仙偶然來到人間世料想神霄未一年玉皇殿下一仙童曾掌符書守蘂宫因甚俗縁猶未斷于今幻質入塵籠氣蓋山河心膽麤不能學劒不搜書夜來掇得乾坤動火候温温守玉爐夢幻之身不久長桑榆能幾耐風霜何如跳去利名窟贈汝長生不死方拈弄溪山詩伎巧吐吞風月酒神通且將詩酒瞞人眼出入紅塵過幾冬題天慶觀買得螺江一葉舟功名如蠟阿休休我無曳尾乞憐態早作灰心不仕謀已學漆園耕白兆甘爲關令候青牛刀圭底事憑誰會明月清風爲點頭題嶽祠南來一劒駐三山分得平生風月懽誰宰旌陽應施藥本求勾漏爲修丹蒙莊且慕漆園禄李老嘗爲柱下官我視榮華眞慣見何如早鍊碧琅玕乳燕飛華屋極目神霄路斗杓南丹華翠景紅霞紫霧手折琪花今似夢十二樓臺何處猶記得當時伴侣東府西臺知誰主憶當時自瀉金瓶兩人間事等風絮上皇赫赫雷霆主我何縁清都絳闕遽成千古白鶴青烏消息斷夢想鸞歌鳳舞應未得翻身歸去業債須教還淨盡這一回嘗遍紅塵苦歸舉似西王母又月插青螺髻柳梢頭夕陽荏苒西風摇曳數粒蒼山粘遠漢樹色煙光紫翠飛騎氣半醒半醉劒胯秋空磨星斗指瓊童不得鳴金轡恐驚動紫清帝浮雲飛度蓬萊水憶山中松寒露冷猿啼鶴唳家在武夷巖谷裏畒一煙霞活計嘆𡑋指人生百歲蘭畹芝田幾今古洞門前小鹿觀花戲不知有人間世贈蘂珠侍經潘常吉一點紅塵惹入心蘂珠殿上墮遺簪當時同降瑶臺路只是于今彭鶴林夢到人間不知退夜夜窗下調玉琴笑指神霄歸未得絳闕清都煙靄深贈紫華侍經周希清螓首蛾眉天上人不知何事到紅塵神霄蘂笈今誰侍紫府琪花不敢春無夢去陪王母宴前生多是紫虚身寄言尋取蓬萊路風送雙鸞上太旻海瓊白眞人語録卷之一
